<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Murad Osmann · full‑page profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #f5f5f5;
      display: flex;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0;                /* remove padding → full bleed */
      margin: 0;
      overflow-x: hidden;
    }

    /* FULL‑PAGE CARD — takes entire width, no border, no radius */
    .profile-card {
      width: 100%;
      max-width: none;           /* override previous max-width */
      background-color: #000000;
      border: none;              /* remove border for seamless edge */
      border-radius: 0;
      box-shadow: none;
      padding: 30px 24px 24px;   /* keep inner spacing */
      min-height: 100vh;         /* stretch to full viewport height */
      display: flex;
      flex-direction: column;
    }

    /* header section — fluid */
    .profile-header {
      display: flex;
      flex-wrap: wrap;
      margin-bottom: 30px;
      width: 100%;
    }

    .avatar-wrapper {
      flex-shrink: 0;
      margin-right: 60px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
      background: #1c1c1c;
      display: block;
    }

    .profile-info {
      flex: 1;
      min-width: 240px;
    }

    .name-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .username {
      font-size: 20px;
      font-weight: 400;
      color: #f5f5f5;
      letter-spacing: 0.3px;
    }

    .follow-btn {
      background-color: #0095f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 18px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .follow-btn:hover {
      background-color: #1877f2;
    }

    /* stats row */
    .stats {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .stat-number {
      font-weight: 600;
      color: #f5f5f5;
    }

    .stat-label {
      color: #a8a8a8;
      font-weight: 400;
    }

    /* bio section */
    .display-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .bio {
      font-size: 14px;
      line-height: 1.5;
      color: #f5f5f5;
      margin-bottom: 8px;
    }

    .location-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 1px;
      color: #a8a8a8;
    }

    /* subtle divider — keeps visual separation */
    .divider {
      border-top: 1px solid #262626;
      margin: 20px 0 16px;
      width: 100%;
    }

    /* post grid — 3 columns, full width, no outer gaps */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      width: 100%;
    }

    .post-item {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background-color: #121212;
      position: relative;
    }

    .post-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .post-item:hover img {
      opacity: 0.8;
    }

    /* bottom footer — also full width */
    .grid-footer {
      margin-top: 20px;
      color: #8e8e8e;
      font-size: 12px;
      border-top: 1px solid #1c1c1c;
      padding-top: 18px;
      text-align: center;
      width: 100%;
    }

    /* responsive fine‑tuning */
    @media (max-width: 600px) {
      .profile-card {
        padding: 20px 16px 20px;
      }

      .profile-header {
        flex-direction: column;
      }

      .avatar-wrapper {
        margin-right: 0;
        display: flex;
        justify-content: center;
      }

      .avatar {
        width: 120px;
        height: 120px;
      }

      .stats {
        justify-content: space-around;
        gap: 20px;
      }

      .post-grid {
        gap: 2px;
      }
    }

    /* optional: keep content comfortable on ultra‑wide, but still full‑bleed */
    @media (min-width: 1800px) {
      .profile-card {
        padding-left: 5vw;
        padding-right: 5vw;
      }
    }

    /* make sure footer stays at bottom if content is short */
    .profile-card {
      justify-content: space-between;
    }

    .spacer {
      flex: 1;
    }
  </style>
</head>
<body>
<div class="profile-card">
  <!-- main content wrapper (no extra container) -->
  <div>
    <!-- header with avatar and stats -->
    <div class="profile-header">
      <div class="avatar-wrapper">
        <img class="avatar" 
             src="https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg?auto=compress&cs=tinysrgb&w=300&h=300&fit=crop&dpr=1" 
             alt="Murad Osmann"
             onerror="this.src='https://ui-avatars.com/api/?name=Murad+Osmann&size=150&background=1a1a1a&color=fff&bold=true'">
      </div>

      <div class="profile-info">
        <div class="name-row">
          <span class="username">muradosmann</span>
          <button class="follow-btn">Follow</button>
        </div>

        <div class="stats">
          <div class="stat-item"><span class="stat-number">793</span> <span class="stat-label">posts</span></div>
          <div class="stat-item"><span class="stat-number">3.2M</span> <span class="stat-label">followers</span></div>
          <div class="stat-item"><span class="stat-number">1,851</span> <span class="stat-label">following</span></div>
        </div>

        <div class="display-name">MURAD OSMANN</div>
        <div class="bio">
          @muradosmann<br>
          DAGSTAN<br>
          2016 was incredible, but 2026 will be even better!
        </div>

        <div class="location-tag">
          <i class="fas fa-map-pin" style="font-size: 12px;"></i> WORLD GOVERNMENT SUMMIT 2026
        </div>
      </div>
    </div>

    <!-- subtle divider -->
    <div class="divider"></div>

    <!-- post grid – now stretches full card width -->
    <div class="post-grid">
      <div class="post-item">
        <img src="https://images.pexels.com/photos/3184306/pexels-photo-3184306.jpeg?auto=compress&cs=tinysrgb&w=600" 
             alt="post"
             onerror="this.src='https://picsum.photos/300/300?random=1&grayscale'">
      </div>
      <div class="post-item">
        <img src="https://images.pexels.com/photos/3182812/pexels-photo-3182812.jpeg?auto=compress&cs=tinysrgb&w=600" 
             alt="post"
             onerror="this.src='https://picsum.photos/300/300?random=2'">
      </div>
      <div class="post-item">
        <img src="https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=600" 
             alt="post"
             onerror="this.src='https://picsum.photos/300/300?random=3'">
      </div>
      <div class="post-item">
        <img src="https://images.pexels.com/photos/1681010/pexels-photo-1681010.jpeg?auto=compress&cs=tinysrgb&w=600" 
             alt="post"
             onerror="this.src='https://picsum.photos/300/300?random=4'">
      </div>
      <div class="post-item">
        <img src="https://images.pexels.com/photos/11832638/pexels-photo-11832638.jpeg?auto=compress&cs=tinysrgb&w=600" 
             alt="post"
             onerror="this.src='https://picsum.photos/300/300?random=5'">
      </div>
      <div class="post-item">
        <img src="https://images.pexels.com/photos/3052361/pexels-photo-3052361.jpeg?auto=compress&cs=tinysrgb&w=600" 
             alt="post"
             onerror="this.src='https://picsum.photos/300/300?random=6'">
      </div>
    </div>
  </div>

  <!-- bottom footer (pushed down if content is short) -->
  <div class="grid-footer">
    <i class="fab fa-instagram" style="margin-right: 6px;"></i> muradosmann · Dagestan · 2026
  </div>
</div>

<script>
  (function() {
    // Enhanced fallback: if any image fails (avatar or post), use reliable placeholder
    const images = document.querySelectorAll('.post-item img, .avatar');
    images.forEach(img => {
      img.addEventListener('error', function() {
        if (this.classList.contains('avatar')) {
          this.src = 'https://ui-avatars.com/api/?name=Murad+Osmann&size=150&background=222&color=fff&bold=true';
        } else {
          // generate unique random for each failed post image
          const randomId = Math.floor(Math.random() * 1000) + Date.now();
          this.src = `https://picsum.photos/400/400?random=${randomId}&grayscale`;
        }
        // prevent infinite loop if fallback also fails (rare)
        this.onerror = null;
      });
    });

    // minor: make the follow button interactive (just a console demo)
    const followBtn = document.querySelector('.follow-btn');
    if(followBtn) {
      followBtn.addEventListener('click', function(e) {
        e.preventDefault();
        if(this.textContent === 'Follow') {
          this.textContent = 'Following';
          this.style.backgroundColor = '#262626';
        } else {
          this.textContent = 'Follow';
          this.style.backgroundColor = '#0095f6';
        }
      });
    }
  })();
</script>
</body>
</html>
