<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Murad Osmann · Instagram profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .profile-card {
      max-width: 935px;
      width: 100%;
      background-color: #000000;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 30px 20px 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    }

    /* header section */
    .profile-header {
      display: flex;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .avatar-wrapper {
      flex-shrink: 0;
      margin-right: 60px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
      background: #1c1c1c;
      display: block;
    }

    .profile-info {
      flex: 1;
      min-width: 240px;
    }

    .name-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .username {
      font-size: 20px;
      font-weight: 400;
      color: #f5f5f5;
      letter-spacing: 0.3px;
    }

    .follow-btn {
      background-color: #0095f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 18px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .follow-btn:hover {
      background-color: #1877f2;
    }

    /* stats row */
    .stats {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .stat-number {
      font-weight: 600;
      color: #f5f5f5;
    }

    .stat-label {
      color: #a8a8a8;
      font-weight: 400;
    }

    /* bio section */
    .display-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .bio {
      font-size: 14px;
      line-height: 1.5;
      color: #f5f5f5;
      margin-bottom: 8px;
    }

    .location-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 1px;
      color: #a8a8a8;
    }

    /* subtle divider */
    .divider {
      border-top: 1px solid #262626;
      margin: 20px 0 16px;
    }

    /* post grid */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .post-item {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background-color: #121212;
      position: relative;
    }

    .post-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .post-item:hover img {
      opacity: 0.8;
    }

    /* bottom footer */
    .grid-footer {
      margin-top: 16px;
      color: #8e8e8e;
      font-size: 12px;
      border-top: 1px solid #1c1c1c;
      padding-top: 18px;
      text-align: center;
    }

    /* responsive */
    @media (max-width: 600px) {
      .profile-header {
        flex-direction: column;
      }
      .avatar-wrapper {
        margin-right: 0;
        display: flex;
        justify-content: center;
      }
      .avatar {
        width: 120px;
        height: 120px;
      }
      .stats {
        justify-content: space-around;
        gap: 20px;
      }
      .post-grid {
        gap: 2px;
      }
    }
  </style>
</head>
<body>
<div class="profile-card">
  <!-- header with avatar and stats -->
  <div class="profile-header">
    <div class="avatar-wrapper">
      <img class="avatar" 
           src="https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg?auto=compress&cs=tinysrgb&w=300&h=300&fit=crop&dpr=1" 
           alt="Murad Osmann"
           onerror="this.src='https://ui-avatars.com/api/?name=Murad+Osmann&size=150&background=1a1a1a&color=fff&bold=true'">
    </div>

    <div class="profile-info">
      <div class="name-row">
        <span class="username">muradosmann</span>
        <button class="follow-btn">Follow</button>
      </div>

      <div class="stats">
        <div class="stat-item"><span class="stat-number">793</span> <span class="stat-label">posts</span></div>
        <div class="stat-item"><span class="stat-number">3.2M</span> <span class="stat-label">followers</span></div>
        <div class="stat-item"><span class="stat-number">1,851</span> <span class="stat-label">following</span></div>
      </div>

      <div class="display-name">MURAD OSMANN</div>
      <div class="bio">
        @muradosmann<br>
        DAGSTAN<br>
        2016 was incredible, but 2026 will be even better!
      </div>

      <div class="location-tag">
        <i class="fas fa-map-pin" style="font-size: 12px;"></i> WORLD GOVERNMENT SUMMIT 2026
      </div>
    </div>
  </div>

  <!-- subtle divider -->
  <div class="divider"></div>

  <!-- post grid -->
  <div class="post-grid">
    <div class="post-item">
      <img src="https://images.pexels.com/photos/3184306/pexels-photo-3184306.jpeg?auto=compress&cs=tinysrgb&w=600" 
           alt="post"
           onerror="this.src='https://picsum.photos/300/300?random=1&grayscale'">
    </div>
    <div class="post-item">
      <img src="https://images.pexels.com/photos/3182812/pexels-photo-3182812.jpeg?auto=compress&cs=tinysrgb&w=600" 
           alt="post"
           onerror="this.src='https://picsum.photos/300/300?random=2'">
    </div>
    <div class="post-item">
      <img src="https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=600" 
           alt="post"
           onerror="this.src='https://picsum.photos/300/300?random=3'">
    </div>
    <div class="post-item">
      <img src="https://images.pexels.com/photos/1681010/pexels-photo-1681010.jpeg?auto=compress&cs=tinysrgb&w=600" 
           alt="post"
           onerror="this.src='https://picsum.photos/300/300?random=4'">
    </div>
    <div class="post-item">
      <img src="https://images.pexels.com/photos/11832638/pexels-photo-11832638.jpeg?auto=compress&cs=tinysrgb&w=600" 
           alt="post"
           onerror="this.src='https://picsum.photos/300/300?random=5'">
    </div>
    <div class="post-item">
      <img src="https://images.pexels.com/photos/3052361/pexels-photo-3052361.jpeg?auto=compress&cs=tinysrgb&w=600" 
           alt="post"
           onerror="this.src='https://picsum.photos/300/300?random=6'">
    </div>
  </div>

  <!-- bottom footer -->
  <div class="grid-footer">
    <i class="fab fa-instagram" style="margin-right: 6px;"></i> muradosmann · Dagestan · 2026
  </div>
</div>

<script>
  (function() {
    const images = document.querySelectorAll('.post-item img, .avatar');
    images.forEach(img => {
      img.addEventListener('error', function() {
        if (this.classList.contains('avatar')) {
          this.src = 'https://ui-avatars.com/api/?name=Murad+Osmann&size=150&background=222&color=fff&bold=true';
        } else {
          const randomId = Math.floor(Math.random() * 1000);
          this.src = `https://picsum.photos/400/400?random=${randomId}&grayscale`;
        }
      });
    });
  })();
</script>
</body>
</html>
