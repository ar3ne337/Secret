<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A3Terminal · ParrotOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e15;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      font-family: 'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace;
    }
    .terminal {
      width: 100%;
      max-width: 1400px;
      height: 95vh;
      background: #0d1219;
      border-radius: 12px;
      border: 1px solid #2a3a4a;
      box-shadow: 0 16px 32px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .term-header {
      background: #151e28;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #2a3f52;
      flex-wrap: wrap;
    }
    .term-header span { color: #8ba5b9; font-size: 13px; }
    .term-header i { color: #6a9c78; margin: 0 4px; }
    .output {
      flex: 1;
      background: #0a1017;
      padding: 16px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.5;
      color: #c5d8e6;
      word-break: break-word;
    }
    .output::-webkit-scrollbar { width: 8px; }
    .output::-webkit-scrollbar-track { background: #0d141c; }
    .output::-webkit-scrollbar-thumb { background: #2a4459; border-radius: 4px; }
    .line { white-space: pre-wrap; word-break: break-word; margin-bottom: 2px; }
    .cmd-echo { color: #7c9cb0; }
    .success { color: #8fcca8; }
    .warning { color: #ddb87a; }
    .error { color: #dd7a7a; }
    .info { color: #8ab8d9; }
    .game { color: #b98fd9; }
    .matrix { color: #2ecc71; text-shadow: 0 0 4px #2ecc71; }
    .hack { color: #ff6b6b; }
    .input-area {
      display: flex;
      align-items: center;
      background: #121b24;
      padding: 12px 16px;
      border-top: 1px solid #253e52;
      flex-wrap: wrap;
    }
    .prompt { color: #7cb083; font-weight: bold; margin-right: 10px; font-size: 14px; }
    .path { color: #9bbbcf; margin-right: 10px; font-size: 13px; white-space: nowrap; }
    #cmdInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e3ecf3;
      font-family: inherit;
      font-size: 14px;
      min-width: 120px;
    }
    #cmdInput::placeholder { color: #4a6a7a; }
    .cursor {
      width: 8px;
      height: 18px;
      background: #7cb083;
      margin-left: 8px;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .status-bar {
      background: #0f1821;
      padding: 6px 16px;
      display: flex;
      gap: 12px;
      border-top: 1px solid #1e3343;
      color: #6d8a9e;
      font-size: 11px;
      flex-wrap: wrap;
    }
    .status-bar span { display: flex; align-items: center; gap: 4px; }
    .ascii-art { font-size: 10px; line-height: 1.2; white-space: pre; color: #8fcca8; }
    @media (max-width: 600px) {
      body { padding: 4px; }
      .terminal { height: 98vh; border-radius: 8px; }
      .ascii-art { font-size: 7px; }
      .path { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="terminal">
  <div class="term-header">
    <span>⬤</span> <span>⬤</span> <span>⬤</span>
    <span style="margin-left: 16px;"><i>user@A3Terminal</i>:~</span>
    <span style="margin-left: auto;">🦜 A3Terminal | ParrotOS</span>
  </div>
  <div id="output" class="output"></div>
  <div class="input-area">
    <span class="prompt">$</span>
    <span id="pathDisplay" class="path">~/</span>
    <input type="text" id="cmdInput" placeholder="Type command..." autofocus autocomplete="off" spellcheck="false">
    <div class="cursor"></div>
  </div>
  <div class="status-bar">
    <span>🟢 ONLINE</span>
    <span id="fileCount">📁 FS: 7 dirs, 15 files</span>
    <span id="uptime">⏱ 0h 0m</span>
    <span>🎮 MATRIX·WORDLE·GUESS·HACKNET</span>
    <span>🌐 NET: CONNECTED</span>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ========== RANDOM FIRST-TIME, PERSISTENT STORAGE ==========
  const STORAGE_KEY = 'a3term_targets_v6';
  const FS_STORAGE_KEY = 'a3term_filesystem_v2';
  const DEV_STATE_KEY = 'a3term_dev_state';
  
  let targetStore = {};
  let devState = {};

  function loadStorage() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) targetStore = JSON.parse(saved);
      
      const devSaved = localStorage.getItem(DEV_STATE_KEY);
      if (devSaved) devState = JSON.parse(devSaved);
    } catch(e) { 
      targetStore = {}; 
      devState = {};
    }
  }
  
  function saveStorage() {
    try { 
      localStorage.setItem(STORAGE_KEY, JSON.stringify(targetStore));
      localStorage.setItem(DEV_STATE_KEY, JSON.stringify(devState));
    } catch(e) {}
  }
  
  loadStorage();

  // Random generators
  const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
  const randFloat = (min, max, decimals = 1) => (Math.random() * (max - min) + min).toFixed(decimals);
  const randomIP = () => `${rand(1,223)}.${rand(0,255)}.${rand(0,255)}.${rand(1,254)}`;
  
  const randomPassword = () => {
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
    const length = rand(8, 16);
    let pass = '';
    for (let i = 0; i < length; i++) {
      pass += chars[rand(0, chars.length - 1)];
    }
    return pass;
  };

  const randomHash = () => {
    return Array(32).fill(0).map(() => '0123456789abcdef'[rand(0,15)]).join('');
  };

  function getTargetData(target, generator) {
    const key = target.toLowerCase().trim();
    if (!key) return null;
    if (!targetStore[key]) {
      targetStore[key] = generator();
      saveStorage();
    }
    return targetStore[key];
  }

  // ========== STATE ==========
  const output = document.getElementById('output');
  const input = document.getElementById('cmdInput');
  const pathDisplay = document.getElementById('pathDisplay');
  const uptimeEl = document.getElementById('uptime');
  const fileCountEl = document.getElementById('fileCount');

  let currentPath = '~';
  const user = 'dev';
  const host = 'A3Terminal';

  let activeGame = null;
  let gameData = {};
  let matrixInterval = null;

  const history = [];
  let historyIdx = -1;

  // Filesystem
  let fs = {};

  function initFilesystem() {
    try {
      const saved = localStorage.getItem(FS_STORAGE_KEY);
      if (saved) {
        fs = JSON.parse(saved);
      } else {
        fs = {
          '~': { type: 'dir', children: ['Documents', 'Projects', 'Downloads', '.config', 'readme.txt', '.bashrc', 'logs'] },
          '~/Documents': { type: 'dir', children: ['notes.md', 'todo.txt', 'secrets.txt'] },
          '~/Projects': { type: 'dir', children: ['web', 'python', 'games'] },
          '~/Downloads': { type: 'dir', children: ['image.png', 'archive.zip'] },
          '~/.config': { type: 'dir', children: ['settings.json'] },
          '~/logs': { type: 'dir', children: ['system.log', 'access.log'] },
          '~/readme.txt': { type: 'file', content: 'Professional Terminal v3.0\nAll commands simulated & functional.' },
          '~/.bashrc': { type: 'file', content: 'alias ll="ls -la"\nexport PATH=$PATH:~/bin' },
          '~/Documents/notes.md': { type: 'file', content: '# Project Notes\n- Complete terminal\n- Add more features' },
          '~/Documents/todo.txt': { type: 'file', content: '[ ] Update docs\n[x] Fix bugs\n[ ] Deploy' },
          '~/Documents/secrets.txt': { type: 'file', content: 'API_KEY=simulated_key_12345' },
          '~/Projects/web/index.html': { type: 'file', content: '<!DOCTYPE html>\n<html>\n<head><title>App</title></head>\n<body>Hello</body>\n</html>' },
          '~/Projects/web/style.css': { type: 'file', content: 'body { background: #0a0e15; color: #c5d8e6; }' },
          '~/Projects/python/scanner.py': { type: 'file', content: '#!/usr/bin/env python3\nimport socket\n\ndef scan(host):\n    print(f"Scanning {host}...")' },
          '~/Projects/python/exploit.py': { type: 'file', content: '# Proof of concept\ndef exploit():\n    return "pwned"' },
          '~/Projects/games/snake.js': { type: 'file', content: '// Snake game implementation\nconst snake = {x: 10, y: 10};' },
          '~/.config/settings.json': { type: 'file', content: '{\n  "theme": "professional",\n  "editor": "vim",\n  "terminal": "pro"\n}' },
          '~/logs/system.log': { type: 'file', content: '[INFO] System started\n[INFO] All services running' },
          '~/logs/access.log': { type: 'file', content: '192.168.1.1 - - [17/Apr/2026:10:30:42] "GET /" 200' },
        };
        saveFilesystem();
      }
    } catch(e) {
      fs = { '~': { type: 'dir', children: ['readme.txt'] }, '~/readme.txt': { type: 'file', content: 'Welcome!' } };
    }
  }

  function saveFilesystem() {
    try { localStorage.setItem(FS_STORAGE_KEY, JSON.stringify(fs)); } catch(e) {}
  }

  function updateFileCount() {
    const files = Object.values(fs).filter(n => n.type === 'file').length;
    const dirs = Object.values(fs).filter(n => n.type === 'dir').length;
    fileCountEl.textContent = `📁 FS: ${dirs} dirs, ${files} files`;
  }

  initFilesystem();

  const boot = Date.now();
  function updateUptime() {
    const s = Math.floor((Date.now() - boot) / 1000);
    uptimeEl.textContent = `⏱ ${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
  }
  setInterval(updateUptime, 1000);

  function resolvePath(base, rel) {
    if (!rel) return base;
    if (rel === '~') return '~';
    if (rel.startsWith('~/')) return rel;
    if (rel.startsWith('/')) return '~' + rel;
    let parts = base === '~' ? [] : base.split('/').filter(p => p && p !== '~');
    const relParts = rel.split('/');
    for (let p of relParts) {
      if (p === '' || p === '.') continue;
      if (p === '..') parts.pop();
      else parts.push(p);
    }
    return parts.length === 0 ? '~' : '~/' + parts.join('/');
  }

  function getNode(path) {
    return path === '~' ? fs['~'] : fs[path] || null;
  }

  function print(text, type = 'normal') {
    const div = document.createElement('div');
    div.className = 'line';
    const typeMap = { cmd:'cmd-echo', success:'success', warning:'warning', error:'error', info:'info', game:'game', matrix:'matrix', hack:'hack' };
    if (typeMap[type]) div.classList.add(typeMap[type]);
    div.innerHTML = String(text).replace(/</g, '&lt;').replace(/>/g, '&gt;');
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  function printHtml(html, type) {
    const div = document.createElement('div');
    div.className = 'line';
    if (type) div.classList.add(type);
    div.innerHTML = html;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  function welcome() {
    printHtml(`<pre class="ascii-art">
  /$$$$$$   /$$$$$$  /$$$$$$$$                                /$$                     /$$
 /$$__  $$ /$$__  $$|__  $$__/                               |__/                    | $$
| $$  \\ $$|__/  \\ $$   | $$  /$$$$$$   /$$$$$$  /$$$$$$/$$$$  /$$ /$$$$$$$   /$$$$$$ | $$
| $$$$$$$$   /$$$$$/    | $$ /$$__  $$ /$$__  $$| $$_  $$_  $$| $$| $$__  $$ |____  $$| $$
| $$__  $$  |___  $$    | $$| $$$$$$$$| $$  \\__/| $$ \\ $$ \\ $$| $$| $$  \\ $$  /$$$$$$$| $$
| $$  | $$ /$$  \\ $$    | $$| $$_____/| $$      | $$ | $$ | $$| $$| $$  | $$ /$$__  $$| $$
| $$  | $$|  $$$$$$/    | $$|  $$$$$$$| $$      | $$ | $$ | $$| $$| $$  | $$|  $$$$$$$| $$
|__/  |__/ \\______/     |__/ \\_______/|__/      |__/ |__/ |__/|__/|__/  |__/ \\_______/|__/
</pre>`, 'success');
    printHtml('<span style="color:#8fcca8;">═══════════════════════════════════════════════════════════════</span>');
    printHtml('<span style="color:#8ab8d9;">   A3 TERMINAL · FULL DEV TOOLS · PERSISTENT STORAGE</span>');
    printHtml('<span style="color:#8fcca8;">═══════════════════════════════════════════════════════════════</span>');
    print('Type "help" for all commands.', 'info');
    print(`Last login: ${new Date().toLocaleString()}`, 'success');
    updateFileCount();
  }

  function updatePrompt() {
    let p = currentPath;
    if (p === '~') p = '~/';
    else if (!p.endsWith('/') && !p.includes('.')) p += '/';
    pathDisplay.textContent = p;
  }

  const TARGET_COMMANDS = ['ping', 'nmap', 'ssh', 'wget', 'curl', 'traceroute', 'dig', 'exploit', 'crack', 'hydra', 'sqlmap', 'john'];

  function validateTarget(cmd, args) {
    if (TARGET_COMMANDS.includes(cmd) && args.length < 2) {
      print(`${cmd}: missing target (host/ip/url/hash/file)`, 'error');
      return false;
    }
    return true;
  }

  function execute(cmdLine) {
    const trimmed = cmdLine.trim();
    if (!trimmed) return;
    print(`$ ${trimmed}`, 'cmd');
    const args = trimmed.split(/\s+/);
    const cmd = args[0].toLowerCase();

    if (activeGame) {
      handleGameInput(cmd, args, trimmed);
      return;
    }

    if (!validateTarget(cmd, args)) return;

    if (cmd === 'help') showHelp();
    else if (cmd === 'clear') output.innerHTML = '';
    else if (cmd === 'ls') listDir(args[1]);
    else if (cmd === 'cd') changeDir(args[1]);
    else if (cmd === 'pwd') printWorkingDir();
    else if (cmd === 'cat') viewFile(args[1]);
    else if (cmd === 'mkdir') makeDir(args[1]);
    else if (cmd === 'touch') touchFile(args[1]);
    else if (cmd === 'rm') removeFile(args.slice(1));
    else if (cmd === 'cp') copyFile(args[1], args[2]);
    else if (cmd === 'mv') moveFile(args[1], args[2]);
    else if (cmd === 'echo') print(args.slice(1).join(' '));
    else if (cmd === 'date') print(new Date().toString());
    else if (cmd === 'whoami') print(user);
    else if (cmd === 'hostname') print(host);
    else if (cmd === 'uptime') showUptime();
    else if (cmd === 'df') showDf();
    else if (cmd === 'free') showFree();
    else if (cmd === 'ps') showPs();
    else if (cmd === 'ping') ping(args[1]);
    else if (cmd === 'nmap') nmap(args[1]);
    else if (cmd === 'ifconfig') ifconfig();
    else if (cmd === 'ssh') ssh(args[1]);
    else if (cmd === 'wget') wget(args[1]);
    else if (cmd === 'curl') curl(args[1]);
    else if (cmd === 'grep') grep(args[1], args[2]);
    else if (cmd === 'wc') wc(args[1]);
    else if (cmd === 'head') head(args[1], args[2]);
    else if (cmd === 'tail') tail(args[1], args[2]);
    else if (cmd === 'chmod') chmod(args[1], args[2]);
    else if (cmd === 'kill') kill(args[1]);
    else if (cmd === 'git') git(args.slice(1));
    else if (cmd === 'python' || cmd === 'python3') python(args.slice(1));
    else if (cmd === 'node') nodejs(args.slice(1));
    else if (cmd === 'npm') npm(args.slice(1));
    else if (cmd === 'docker') docker(args.slice(1));
    else if (cmd === 'systemctl') systemctl(args[1], args[2]);
    else if (cmd === 'cowsay') cowsay(args.slice(1).join(' '));
    else if (cmd === 'fortune') fortune();
    else if (cmd === 'history') showHistory();
    else if (cmd === 'matrix') startMatrix();
    else if (cmd === 'wordle') startWordle();
    else if (cmd === 'guess') startGuess();
    else if (cmd === 'hacknet') startHacknet();
    else if (cmd === 'scan') scanNetwork();
    else if (cmd === 'exploit') exploit(args[1]);
    else if (cmd === 'decrypt') decrypt();
    else if (cmd === 'crack') crack(args[1]);
    else if (cmd === 'hydra') hydra(args[1]);
    else if (cmd === 'sqlmap') sqlmap(args[1]);
    else if (cmd === 'metasploit') metasploit();
    else if (cmd === 'aircrack') aircrack();
    else if (cmd === 'john') john(args[1]);
    else if (cmd === 'netstat') netstat();
    else if (cmd === 'traceroute') traceroute(args[1]);
    else if (cmd === 'dig') dig(args[1]);
    else print(`command not found: ${cmd}`, 'error');
  }

  function showHelp() {
    printHtml('<span style="color:#8fcca8;">═══════════════════════════════════════════════════════════════</span>');
    printHtml('<span style="color:#b98fd9;">ALL COMMANDS (random first-time, then persistent)</span>');
    printHtml('<span style="color:#8fcca8;">───────────────────────────────────────────────────────────────</span>');
    printHtml('<span style="color:#8ab8d9;">📁 FILE:</span> <span style="color:#c5d8e6;">ls, cd, pwd, cat, mkdir, touch, rm, cp, mv</span>');
    printHtml('<span style="color:#8ab8d9;">📊 SYSTEM:</span> <span style="color:#c5d8e6;">date, whoami, hostname, uptime, df, free, ps, kill &lt;pid&gt;</span>');
    printHtml('<span style="color:#8ab8d9;">🌐 NETWORK:</span> <span style="color:#c5d8e6;">ping, nmap, ifconfig, ssh, wget, curl, traceroute, dig, netstat</span>');
    printHtml('<span style="color:#8ab8d9;">🔧 DEV:</span> <span style="color:#c5d8e6;">git [status|log|branch|commit], python [script.py], node [script.js], npm [install|list], docker [ps|images|run], systemctl [start|stop|status] &lt;service&gt;</span>');
    printHtml('<span style="color:#8ab8d9;">📝 TEXT:</span> <span style="color:#c5d8e6;">echo, grep, wc, head, tail, chmod</span>');
    printHtml('<span style="color:#8ab8d9;">🎮 GAMES:</span> <span style="color:#c5d8e6;">matrix, wordle, guess, hacknet</span>');
    printHtml('<span style="color:#8ab8d9;">💀 HACKING:</span> <span style="color:#c5d8e6;">scan, exploit, decrypt, crack, hydra, sqlmap, metasploit, aircrack, john</span>');
    printHtml('<span style="color:#8ab8d9;">🎭 FUN:</span> <span style="color:#c5d8e6;">cowsay, fortune</span>');
    printHtml('<span style="color:#8ab8d9;">📜 UTILS:</span> <span style="color:#c5d8e6;">clear, history</span>');
  }

  function listDir(arg) {
    const target = arg ? resolvePath(currentPath, arg) : currentPath;
    const node = getNode(target);
    if (!node) { print(`ls: ${arg}: No such file`, 'error'); return; }
    if (node.type !== 'dir') { print(`ls: ${target}: Not a directory`, 'error'); return; }
    const items = node.children || [];
    const html = items.map(c => {
      const full = target === '~' ? `~/${c}` : `${target}/${c}`;
      const n = getNode(full);
      return n?.type === 'dir' ? `<span style="color:#8fcca8;">${c}/</span>` : `<span style="color:#c5d8e6;">${c}</span>`;
    }).join('  ');
    printHtml(html || '(empty)');
  }
  
  function changeDir(arg) {
    if (!arg || arg === '~') { currentPath = '~'; updatePrompt(); return; }
    const newPath = resolvePath(currentPath, arg);
    const node = getNode(newPath);
    if (!node || node.type !== 'dir') { print(`cd: ${arg}: No such directory`, 'error'); return; }
    currentPath = newPath; updatePrompt();
  }
  
  function printWorkingDir() {
    print(currentPath === '~' ? '/home/user' : currentPath.replace('~', '/home/user'), 'success');
  }
  
  function viewFile(arg) {
    if (!arg) { print('cat: missing file', 'error'); return; }
    const fp = resolvePath(currentPath, arg);
    const node = getNode(fp);
    if (!node) { print(`cat: ${arg}: No such file`, 'error'); return; }
    if (node.type !== 'file') { print(`cat: ${arg}: Is directory`, 'error'); return; }
    print(node.content || '(empty)');
  }
  
  function makeDir(arg) {
    if (!arg) { print('mkdir: missing operand', 'error'); return; }
    const fp = resolvePath(currentPath, arg);
    if (getNode(fp)) { print(`mkdir: ${arg}: File exists`, 'error'); return; }
    const parentPath = fp.substring(0, fp.lastIndexOf('/')) || '~';
    const parent = getNode(parentPath);
    if (!parent || parent.type !== 'dir') { print(`mkdir: ${arg}: No such directory`, 'error'); return; }
    const name = fp.split('/').pop();
    parent.children.push(name);
    fs[fp] = { type: 'dir', children: [] };
    saveFilesystem();
    print(`mkdir: created directory '${arg}'`, 'success');
    updateFileCount();
  }
  
  function touchFile(arg) {
    if (!arg) { print('touch: missing file', 'error'); return; }
    const fp = resolvePath(currentPath, arg);
    if (!getNode(fp)) {
      const parentPath = fp.substring(0, fp.lastIndexOf('/')) || '~';
      const parent = getNode(parentPath);
      if (parent && parent.type === 'dir') {
        parent.children.push(fp.split('/').pop());
        fs[fp] = { type: 'file', content: '' };
        saveFilesystem();
      }
    }
    print(`touch: ${arg}`, 'success'); updateFileCount();
  }
  
  function removeFile(args) {
    if (!args.length) { print('rm: missing operand', 'error'); return; }
    args.forEach(arg => {
      const fp = resolvePath(currentPath, arg);
      if (!getNode(fp)) { print(`rm: ${arg}: No such file`, 'error'); return; }
      delete fs[fp];
      const parentPath = fp.substring(0, fp.lastIndexOf('/')) || '~';
      const parent = getNode(parentPath);
      if (parent) parent.children = parent.children.filter(c => c !== fp.split('/').pop());
      print(`rm: removed '${arg}'`, 'warning');
    });
    saveFilesystem();
    updateFileCount();
  }
  
  function copyFile(s,d) { 
    if(!s||!d) { print('cp: missing operand','error'); return; }
    print(`cp: '${s}' -> '${d}' (simulated)`, 'success'); 
  }
  
  function moveFile(s,d) { 
    if(!s||!d) { print('mv: missing operand','error'); return; }
    print(`mv: '${s}' -> '${d}' (simulated)`, 'success'); 
  }
  
  function showUptime() { 
    const s=Math.floor((Date.now()-boot)/1000); 
    print(`${Math.floor(s/3600)}:${String(Math.floor((s%3600)/60)).padStart(2,'0')} up ${Math.floor(s/86400)} days, 1 user, load average: ${randFloat(0,1.5,2)}`); 
  }
  
  function showDf() { 
    print('Filesystem     1K-blocks    Used Available Use% Mounted on');

  function systemctl(service, action='status') {
    if (!service) {
      print('systemctl: missing service name', 'error');
      return;
    }
    
    if (!devState.services) {
      devState.services = {
        'ssh': { status: 'active', enabled: true },
        'nginx': { status: 'active', enabled: true },
        'docker': { status: 'active', enabled: true },
        'mysql': { status: 'inactive', enabled: false },
        'postgresql': { status: 'failed', enabled: false }
      };
      saveStorage();
    }
    
    const services = devState.services;
    
    if (!services[service]) {
      services[service] = { status: 'inactive', enabled: false };
    }
    
    const svc = services[service];
    
    if (action === 'status') {
      if (svc.status === 'active') {
        print(`● ${service}.service - ${service} daemon`, 'success');
        print(`   Loaded: loaded (/lib/systemd/system/${service}.service; ${svc.enabled ? 'enabled' : 'disabled'})`, 'info');
        print(`   Active: active (running) since ${new Date(Date.now()-rand(3600000,86400000)).toLocaleString()}`, 'success');
        print(`   Main PID: ${rand(1000,9999)} (${service})`, 'info');
        print(`   Tasks: ${rand(1,10)} (limit: 4915)`, 'info');
        print(`   Memory: ${rand(10,500)}.${rand(0,9)}M`, 'info');
        print(`   CGroup: /system.slice/${service}.service`, 'info');
      } else if (svc.status === 'failed') {
        print(`● ${service}.service - ${service} daemon`, 'error');
        print(`   Loaded: loaded (/lib/systemd/system/${service}.service; ${svc.enabled ? 'enabled' : 'disabled'})`, 'info');
        print(`   Active: failed (Result: exit-code)`, 'error');
        print(`   Process: ${rand(1000,9999)} ExecStart=/usr/sbin/${service} (code=exited, status=1/FAILURE)`, 'error');
      } else {
        print(`● ${service}.service - ${service} daemon`, 'warning');
        print(`   Loaded: loaded (/lib/systemd/system/${service}.service; ${svc.enabled ? 'enabled' : 'disabled'})`, 'info');
        print(`   Active: inactive (dead)`, 'warning');
      }
    } else if (action === 'start') {
      if (svc.status === 'active') {
        print(`Warning: ${service}.service is already active`, 'warning');
      } else {
        svc.status = 'active';
        print(`Starting ${service}.service...`, 'info');
        setTimeout(() => {
          print(`Started ${service}.service.`, 'success');
          saveStorage();
        }, 300);
      }
    } else if (action === 'stop') {
      if (svc.status !== 'active') {
        print(`Warning: ${service}.service is not active`, 'warning');
      } else {
        svc.status = 'inactive';
        print(`Stopping ${service}.service...`, 'info');
        setTimeout(() => {
          print(`Stopped ${service}.service.`, 'success');
          saveStorage();
        }, 300);
      }
    } else if (action === 'restart') {
      svc.status = 'inactive';
      print(`Stopping ${service}.service...`, 'info');
      setTimeout(() => {
        print(`Stopped ${service}.service.`, 'success');
        print(`Starting ${service}.service...`, 'info');
        setTimeout(() => {
          svc.status = 'active';
          print(`Started ${service}.service.`, 'success');
          saveStorage();
        }, 300);
      }, 300);
    } else if (action === 'enable') {
      svc.enabled = true;
      print(`Created symlink /etc/systemd/system/multi-user.target.wants/${service}.service → /lib/systemd/system/${service}.service.`, 'success');
      saveStorage();
    } else if (action === 'disable') {
      svc.enabled = false;
      print(`Removed /etc/systemd/system/multi-user.target.wants/${service}.service.`, 'success');
      saveStorage();
    } else if (action === 'list-units') {
      print('UNIT                      LOAD   ACTIVE SUB       DESCRIPTION', 'info');
      Object.entries(services).forEach(([name, s]) => {
        const status = s.status === 'active' ? 'active' : (s.status === 'failed' ? 'failed' : 'inactive');
        print(`${name}.service              loaded ${status.padEnd(8)} running    ${name} daemon`, s.status==='active'?'success':(s.status==='failed'?'error':'warning'));
      });
    } else {
      print(`Unknown operation ${action}.`, 'error');
    }
  }

  function handleGameInput(cmd, args) {
    if (cmd === 'exit' || cmd === 'quit') {
      if (activeGame === 'matrix' && matrixInterval) clearInterval(matrixInterval);
      print(`Exited ${activeGame}`, 'warning'); activeGame = null; gameData = {}; matrixInterval = null; return;
    }
    if (activeGame === 'matrix') { 
      if(cmd==='stop'){clearInterval(matrixInterval); activeGame=null; print('Matrix stopped.', 'success');} 
      return; 
    }
    if (activeGame === 'wordle') {
      const g = cmd.toLowerCase(); 
      if(!/^[a-z]{5}$/.test(g)) { print('5 letters','error'); return; }
      let res=''; const t=gameData.word;
      for(let i=0;i<5;i++) res += g[i]===t[i]?'🟩':(t.includes(g[i])?'🟨':'⬛');
      gameData.attempts++; 
      print(`${g.toUpperCase()}  ${res}  (${gameData.attempts}/6)`, 'game');
      if(g===t){ print('🎉 CORRECT! You win!','success'); activeGame=null; }
      else if(gameData.attempts>=6){ print(`❌ Game over. Word: ${t.toUpperCase()}`,'error'); activeGame=null; }
      return;
    }
    if (activeGame === 'guess') {
      const n=parseInt(cmd); 
      if(isNaN(n)){print('Enter a number','error');return;}
      if(n===gameData.secret){ print(`🎯 Correct! ${n}`,'success'); activeGame=null; }
      else {
        const diff=Math.abs(n-gameData.secret);
        let hint=n<gameData.secret?'Higher!':'Lower!';
        if(diff>30) hint+=' (Very cold)';
        else if(diff>15) hint+=' (Cold)';
        else if(diff>5) hint+=' (Warm)';
        else hint+=' (Hot!)';
        print(hint,'warning');
      }
      return;
    }
    if (activeGame === 'hacknet') {
      if(cmd==='scan') {
        print(`╔══════════════════════════════╗\n║ NODE: ${gameData.node.padEnd(16)}║\n║ IP: ${gameData.ip.padEnd(18)}║\n║ FIREWALL: ${gameData.fw}/10${' '.repeat(8)}║\n╚══════════════════════════════╝`, 'hack');
      } else if(cmd==='attack') {
        if(gameData.fw<=0){ print('Already hacked!','warning'); return; }
        gameData.fw=Math.max(0,gameData.fw-rand(1,2));
        print(`[ATTACK] Firewall reduced to ${gameData.fw}/10`, gameData.fw===0?'success':'info');
        if(gameData.fw===0){ print('💀 NODE HACKED! Root access obtained!','success'); activeGame=null; }
      } else if(cmd==='exploit') {
        if(gameData.fw<=0){ print('Already hacked!','warning'); return; }
        if(Math.random()>0.3){ gameData.fw=0; print('[EXPLOIT] Success! Firewall bypassed!','success'); print('💀 NODE HACKED!','success'); activeGame=null; }
        else print('[!] Exploit failed','error');
      } else if(cmd==='status') print(`Firewall: ${gameData.fw}/10`, 'info');
      else print('HACKNET: scan, attack, exploit, status, exit', 'warning');
      return;
    }
  }

    gameData={ 
      node:`GW-${rand(100,999)}-${String.fromCharCode(65+rand(0,25))}`, 
      ip:`10.0.${rand(0,255)}.${rand(1,254)}`, 
      fw:rand(4,8) 
    };
    print('🌐═══════════════════════════════', 'hack');
    print(`   HACKNET - TARGET ACQUIRED`, 'game');
    print(`   Node: ${gameData.node}`, 'info');
    print(`   IP: ${gameData.ip}`, 'info');

    print('Commands: scan, attack, exploit, status, exit', 'info');

  function init() {
    welcome(); 
    updatePrompt();
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const val = input.value;
        if (val.trim()) { 
          history.push(val); 
          historyIdx = history.length; 
          execute(val); 
        }
        input.value = '';
      } else if (e.key === 'ArrowUp') { 
        e.preventDefault(); 
        if(!history.length) return; 
        historyIdx=Math.max(0,historyIdx-1); 
        input.value=history[historyIdx]||''; 
      } else if (e.key === 'ArrowDown') { 
        e.preventDefault(); 
        if(historyIdx<history.length-1){ 
          historyIdx++; 
          input.value=history[historyIdx]; 
        } else { 
          historyIdx=history.length; 
          input.value=''; 
        } 
      }
    });
    document.querySelector('.terminal').addEventListener('click', ()=>input.focus());
  }
  
  init();
})();
</script>
