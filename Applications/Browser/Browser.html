<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>A3 Browser Pro</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ----- PROFESSIONAL DARK THEME ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0A0A0C;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
      color: #E8E8EE;
    }

    /* main application window */
    .browser-pro {
      width: 100%;
      max-width: 1400px;
      height: 95vh;
      max-height: 950px;
      background: #0E0E12;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(70, 70, 90, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ----- TITLE BAR (window controls) ----- */
    .title-bar {
      padding: 8px 16px;
      background: #0E0E12;
      border-bottom: 1px solid #1E1E28;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
    }

    .window-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .window-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: opacity 0.2s;
      border: none;
    }
    .window-btn.close { background: #FF5F56; }
    .window-btn.minimize { background: #FFBD2E; }
    .window-btn.maximize { background: #27C93F; }
    .window-btn:hover { opacity: 0.8; }

    .title-info {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #808090;
      font-size: 0.85rem;
      font-weight: 400;
    }

    .title-logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      object-fit: contain;
    }

    .profile-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-app-region: no-drag;
    }
    .profile-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    /* ----- TAB BAR (professional multi-tab) ----- */
    .tab-bar {
      display: flex;
      align-items: center;
      padding: 0 12px 0 8px;
      background: #0E0E12;
      border-bottom: 1px solid #1E1E28;
      gap: 4px;
    }

    .tabs-container {
      display: flex;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 2px;
    }
    .tabs-container::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #16161E;
      border-radius: 10px 10px 0 0;
      border: 1px solid #252530;
      border-bottom: none;
      color: #A0A0B0;
      font-size: 0.85rem;
      max-width: 200px;
      min-width: 120px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab.active {
      background: #1C1C28;
      color: #FFFFFF;
      border-color: #3B82F6;
      box-shadow: 0 -2px 0 #3B82F6;
    }
    .tab:hover:not(.active) {
      background: #1E1E2A;
      color: #D0D0E0;
    }
    .tab-favicon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #808090;
    }
    .tab-favicon img {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }
    .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab-close {
      opacity: 0;
      background: none;
      border: none;
      color: #808090;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      transition: opacity 0.15s, color 0.15s;
    }
    .tab:hover .tab-close { opacity: 1; }
    .tab-close:hover { color: #EF4444; }

    .new-tab-btn {
      background: #1A1A24;
      border: 1px solid #2A2A38;
      color: #A0A0B0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      margin-left: 4px;
      transition: all 0.15s;
    }
    .new-tab-btn:hover {
      background: #252532;
      color: #FFFFFF;
      border-color: #3B82F6;
    }

    /* ----- SIDEBAR (bookmarks & tools) ----- */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 220px;
      background: #0C0C10;
      border-right: 1px solid #1E1E28;
      display: flex;
      flex-direction: column;
      padding: 16px 0;
    }

    .sidebar-section {
      padding: 8px 12px;
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      color: #606070;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin: 2px 4px;
      border-radius: 8px;
      color: #B0B0C0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .bookmark-item:hover {
      background: #1A1A26;
      color: #FFFFFF;
    }
    .bookmark-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9090A0;
      font-size: 14px;
    }
    .bookmark-item:hover .bookmark-icon {
      color: #FFFFFF;
    }
    .bookmark-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin: 2px 4px;
      border-radius: 8px;
      color: #9090A0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tool-item:hover {
      background: #1A1A26;
      color: #FFFFFF;
    }
    .tool-item.active {
      background: #1E1E30;
      color: #3B82F6;
      border-left: 3px solid #3B82F6;
    }
    
    .tool-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #9090A0;
    }
    .tool-item:hover .tool-icon,
    .tool-item.active .tool-icon {
      color: #3B82F6;
    }
    .tool-icon img {
      width: 20px;
      height: 20px;
      border-radius: 4px;
    }

    /* ----- MAIN CONTENT (viewport) ----- */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* navigation bar */
    .nav-bar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #0E0E12;
      gap: 12px;
      border-bottom: 1px solid #1A1A24;
    }

    .nav-actions {
      display: flex;
      gap: 4px;
    }
    .nav-btn {
      background: #16161E;
      border: 1px solid #282838;
      color: #C0C0D0;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-btn:hover {
      background: #20202E;
      color: #FFFFFF;
      border-color: #3B82F6;
    }

    .url-bar-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: #14141C;
      border-radius: 12px;
      padding: 2px 2px 2px 16px;
      border: 1.5px solid #282838;
      transition: all 0.2s;
    }
    .url-bar-wrapper:focus-within {
      border-color: #3B82F6;
      background: #181822;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: #1E1E2A;
      border-radius: 8px;
      margin-right: 8px;
      font-size: 0.75rem;
      color: #10B981;
    }
    .security-badge i {
      font-size: 12px;
    }

    #urlInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #F0F0F8;
      font-size: 0.95rem;
      padding: 12px 0;
      font-family: inherit;
    }
    #urlInput::placeholder {
      color: #606070;
    }

    .url-actions {
      display: flex;
      gap: 4px;
      margin-left: 4px;
    }
    .action-btn {
      background: #1E1E2A;
      border: 1px solid #303040;
      color: #C0C0D0;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:hover {
      background: #2A2A3A;
      color: #FFFFFF;
      border-color: #3B82F6;
    }

    /* viewport */
    .viewport-container {
      flex: 1;
      background: #000;
      position: relative;
    }

    #browserFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    /* status bar */
    .status-bar-pro {
      padding: 6px 16px;
      background: #0A0A0E;
      border-top: 1px solid #1A1A24;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #707080;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-item i {
      font-size: 12px;
    }
    .status-item .fa-circle {
      font-size: 8px;
    }

    .progress-bar {
      width: 100px;
      height: 3px;
      background: #2A2A38;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3B82F6, #60A5FA);
      transition: width 0.3s;
    }

    /* bookmark dialog (minimal) */
    .bookmark-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1A1A28;
      border: 1px solid #303048;
      border-radius: 16px;
      padding: 24px;
      width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
      display: none;
      z-index: 1000;
    }
    .bookmark-dialog.active { display: block; }
    .dialog-title {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #FFFFFF;
    }
    .dialog-input {
      width: 100%;
      padding: 12px;
      background: #0E0E18;
      border: 1px solid #303048;
      border-radius: 10px;
      color: #FFFFFF;
      margin-bottom: 12px;
    }
    .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .dialog-btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .dialog-btn.primary {
      background: #3B82F6;
      color: white;
    }
    .dialog-btn.secondary {
      background: #2A2A3A;
      color: #C0C0D0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      z-index: 999;
    }
    .overlay.active { display: block; }
  </style>
</head>
<body>
<div class="browser-pro">
  <!-- Title Bar -->
  <div class="title-bar">
    <div class="window-controls">
      <button class="window-btn close"></button>
      <button class="window-btn minimize"></button>
      <button class="window-btn maximize"></button>
    </div>
    <div class="title-info">
      <img src="https://a3os.pages.dev/Applications/Browser/A3BrowserLogo.png" alt="A3 Logo" class="title-logo">
      <span>A3 Browser Pro</span>
    </div>
    <div class="profile-badge">
      <span style="color:#707080;">Workspace</span>
      <div class="profile-icon">P</div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs-container" id="tabsContainer"></div>
    <button class="new-tab-btn" id="newTabBtn">+</button>
  </div>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span>Bookmarks</span>
        <button id="addBookmarkBtn" style="background:none;border:none;color:#707080;cursor:pointer;font-size:16px;"><i class="fas fa-plus"></i></button>
      </div>
      <div class="sidebar-section" id="bookmarksList"></div>
      
      <div class="sidebar-header" style="margin-top:16px;">
        <span>Tools</span>
      </div>
      <div class="tool-item active" data-tool="browser">
        <span class="tool-icon"><img src="https://a3os.pages.dev/Applications/Browser/A3.png" alt="Browser"></span>
        <span>Browser</span>
      </div>
      <div class="tool-item" data-tool="history">
        <span class="tool-icon"><i class="far fa-clock"></i></span>
        <span>History</span>
      </div>
      <div class="tool-item" data-tool="downloads">
        <span class="tool-icon"><i class="fas fa-download"></i></span>
        <span>Downloads</span>
      </div>
      <div class="tool-item" data-tool="settings">
        <span class="tool-icon"><i class="fas fa-cog"></i></span>
        <span>Settings</span>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area">
      <!-- Navigation Bar -->
      <div class="nav-bar">
        <div class="nav-actions">
          <button class="nav-btn" id="backBtn" title="Back"><i class="fas fa-arrow-left"></i></button>
          <button class="nav-btn" id="forwardBtn" title="Forward"><i class="fas fa-arrow-right"></i></button>
          <button class="nav-btn" id="refreshBtn" title="Refresh"><i class="fas fa-redo-alt"></i></button>
          <button class="nav-btn" id="homeBtn" title="Home"><i class="fas fa-home"></i></button>
        </div>
        
        <div class="url-bar-wrapper">
          <div class="security-badge" id="securityBadge">
            <i class="fas fa-lock"></i>
            <span id="securityText">Secure</span>
          </div>
          <input type="text" id="urlInput" placeholder="Search with DuckDuckGo or type URL" spellcheck="false" autocomplete="off" />
          <div class="url-actions">
            <button class="action-btn" id="bookmarkPageBtn" title="Bookmark"><i class="far fa-bookmark"></i></button>
            <button class="action-btn" id="goBtn" title="Go"><i class="fas fa-arrow-right"></i></button>
          </div>
        </div>
      </div>

      <!-- Viewport -->
      <div class="viewport-container">
        <iframe id="browserFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals" allow="fullscreen"></iframe>
      </div>

      <!-- Status Bar -->
      <div class="status-bar-pro">
        <div class="status-left">
          <span class="status-item" id="connectionStatus">
            <i class="fas fa-circle" style="color: #10B981; font-size: 8px;"></i>
            <span>Connected</span>
          </span>
          <span class="status-item" id="pageStatus">Ready</span>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
        <div>
          <span id="urlDisplay">a3://welcome</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bookmark Dialog -->
<div class="overlay" id="overlay"></div>
<div class="bookmark-dialog" id="bookmarkDialog">
  <div class="dialog-title"><i class="fas fa-bookmark" style="margin-right: 8px;"></i>Add Bookmark</div>
  <input type="text" class="dialog-input" id="bookmarkName" placeholder="Name" value="">
  <input type="text" class="dialog-input" id="bookmarkUrl" placeholder="URL" value="">
  <div class="dialog-actions">
    <button class="dialog-btn secondary" id="cancelBookmark">Cancel</button>
    <button class="dialog-btn primary" id="saveBookmark">Save</button>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ----- STATE MANAGEMENT -----
    let tabs = [];
    let activeTabId = null;
    let bookmarks = [];
    let isLoading = false;
    let navigationHistory = [];
    let historyIndex = -1;

    // DOM Elements
    const iframe = document.getElementById('browserFrame');
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const backBtn = document.getElementById('backBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const homeBtn = document.getElementById('homeBtn');
    const newTabBtn = document.getElementById('newTabBtn');
    const tabsContainer = document.getElementById('tabsContainer');
    const bookmarksList = document.getElementById('bookmarksList');
    const addBookmarkBtn = document.getElementById('addBookmarkBtn');
    const bookmarkPageBtn = document.getElementById('bookmarkPageBtn');
    const securityBadge = document.getElementById('securityBadge');
    const securityText = document.getElementById('securityText');
    const connectionStatus = document.getElementById('connectionStatus');
    const pageStatus = document.getElementById('pageStatus');
    const urlDisplay = document.getElementById('urlDisplay');

    const overlay = document.getElementById('overlay');
    const bookmarkDialog = document.getElementById('bookmarkDialog');
    const bookmarkName = document.getElementById('bookmarkName');
    const bookmarkUrl = document.getElementById('bookmarkUrl');
    const cancelBookmark = document.getElementById('cancelBookmark');
    const saveBookmark = document.getElementById('saveBookmark');

    // ----- UTILITIES -----
    function generateId() { return Date.now() + '-' + Math.random().toString(36); }

    function isUrl(input) {
      const trimmed = input.trim();
      return /^https?:\/\//i.test(trimmed) || 
             /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(:\d+)?(\/.*)?$/.test(trimmed) || 
             /^localhost(:\d+)?/i.test(trimmed);
    }

    function processUrl(input) {
      let trimmed = input.trim();
      if (!trimmed) return '';
      if (trimmed.startsWith('http://') || trimmed.startsWith('https://')) return trimmed;
      return 'https://' + trimmed;
    }

    function updateUIForUrl(url) {
      if (!url || url === 'about:newtab' || url.startsWith('search:')) {
        securityBadge.innerHTML = '<i class="fas fa-shield-alt"></i><span>A3</span>';
        connectionStatus.innerHTML = '<i class="fas fa-circle" style="color: #10B981; font-size: 8px;"></i><span>Connected</span>';
        urlDisplay.textContent = url.startsWith('search:') ? 'Search Results' : 'a3://welcome';
        return;
      }
      try {
        const u = new URL(url);
        urlDisplay.textContent = u.hostname;
        if (u.protocol === 'https:') {
          securityBadge.innerHTML = '<i class="fas fa-lock"></i><span>Secure</span>';
          connectionStatus.innerHTML = '<i class="fas fa-circle" style="color: #10B981; font-size: 8px;"></i><span>Secure HTTPS</span>';
        } else {
          securityBadge.innerHTML = '<i class="fas fa-lock-open"></i><span>HTTP</span>';
          connectionStatus.innerHTML = '<i class="fas fa-circle" style="color: #FBBF24; font-size: 8px;"></i><span>Not Secure</span>';
        }
      } catch(e) {
        urlDisplay.textContent = url;
      }
    }

    function startLoading() {
      isLoading = true;
      pageStatus.textContent = 'Loading...';
      progressFill.style.width = '60%';
    }

    function stopLoading() {
      isLoading = false;
      pageStatus.textContent = 'Ready';
      progressFill.style.width = '100%';
      setTimeout(() => progressFill.style.width = '0%', 200);
    }

    // ----- SEARCH FUNCTIONALITY -----

      startLoading();
      urlInput.value = query;
      
      try {
        const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`);
        const data = await response.json();
        
        const resultsHtml = `<!DOCTYPE html>

.source-link:hover{text-decoration:underline}
.results-section{margin-top:30px}
.results-section h3{color:#A0A0B0;margin-bottom:20px;font-size:16px;text-transform:uppercase;letter-spacing:1px}
.result-item{background:#16161E;padding:18px;border-radius:10px;margin-bottom:12px;cursor:pointer;transition:all 0.2s;border:1px solid #252530}
.result-item:hover{background:#1E1E2A;border-color:#3B82F6;transform:translateX(5px)}
.result-title{color:#60A5FA;font-size:16px;font-weight:600;margin-bottom:8px}
.result-description{color:#B0B0C0;font-size:14px;line-height:1.5}
.external-link{margin-top:20px;padding:15px;background:#1A1A26;border-radius:8px;text-align:center}
.external-link a{color:#3B82F6;text-decoration:none;cursor:pointer}
</style></head><body>
<div class="search-container">
<div class="search-header">
<div class="search-box"><input type="text" id="searchInput" value="${query.replace(/"/g, '&quot;')}" placeholder="Search DuckDuckGo or enter URL">
<button onclick="window.parent.searchAgain()"><i class="fas fa-search"></i> Search</button></div>
<div class="result-stats"><i class="fas fa-globe"></i> Results from DuckDuckGo</div>
</div>
${data.AbstractText ? `<div class="instant-answer"><h3><i class="fas fa-bolt"></i> Instant Answer</h3><p>${data.AbstractText}</p>
${data.AbstractURL ? `<a class="source-link" onclick="window.parent.loadUrl('${data.AbstractURL}')"><i class="fas fa-external-link-alt"></i> Source: ${new URL(data.AbstractURL).hostname}</a>` : ''}</div>` : ''}
${data.RelatedTopics && data.RelatedTopics.length > 0 ? `<div class="results-section"><h3><i class="fas fa-list"></i> Related Results</h3>
${data.RelatedTopics.filter(t => t.Text && t.FirstURL).slice(0, 15).map(topic => 
    `<div class="result-item" onclick="window.parent.loadUrl('${topic.FirstURL}')"><div class="result-title"><i class="fas fa-link"></i> ${topic.Text.split(' - ')[0]}</div>
    <div class="result-description">${topic.Text.includes(' - ') ? topic.Text.split(' - ').slice(1).join(' - ') : topic.Text}</div></div>`
).join('')}</div>` : ''}
<div class="external-link"><a onclick="window.parent.openInBrowser('${query}')"><i class="fas fa-external-link-alt"></i> Open in DuckDuckGo.com</a></div>
</div>
<script>document.getElementById('searchInput').addEventListener('keypress',function(e){if(e.key==='Enter')window.parent.searchAgain();});<\/script>
</body></html>`;
        
        iframe.srcdoc = resultsHtml;
        updateActiveTab('search:' + query, `Search: ${query}`);
        updateUIForUrl('search:' + query);
      } catch (error) {
        // Fallback to DuckDuckGo HTML
        iframe.src = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(query)}`;
        updateActiveTab('search:' + query, `Search: ${query}`);
        updateUIForUrl('search:' + query);
      }
      stopLoading();
    }

    window.searchAgain = function() {
      try {
        const searchInput = iframe.contentDocument.getElementById('searchInput');
        if (searchInput) {
          const query = searchInput.value.trim();
          if (query) navigateTo(query);
        }
      } catch(e) {}
    };

    window.loadUrl = function(url) {
      navigateTo(url);
    };

    window.openInBrowser = function(query) {
      window.open(`https://duckduckgo.com/?q=${encodeURIComponent(query)}`, '_blank');
    };

    // ----- TAB MANAGEMENT -----
    function renderTabs() {
      tabsContainer.innerHTML = '';
      tabs.forEach(tab => {
        const tabEl = document.createElement('div');
        tabEl.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
        const displayTitle = tab.title || 'New Tab';
        const shortTitle = displayTitle.length > 25 ? displayTitle.substring(0, 22) + '...' : displayTitle;
        tabEl.innerHTML = `
          <div class="tab-favicon">${tab.favicon || '<i class="fas fa-globe"></i>'}</div>
          <span class="tab-title">${shortTitle}</span>
          <button class="tab-close" data-tab-id="${tab.id}">×</button>
        `;
        tabEl.addEventListener('click', (e) => {
          if (!e.target.classList.contains('tab-close')) {
            switchTab(tab.id);
          }
        });
        tabEl.querySelector('.tab-close').addEventListener('click', (e) => {
          e.stopPropagation();
          closeTab(tab.id);
        });
        tabsContainer.appendChild(tabEl);
      });
    }

    function createTab(url = '', title = 'New Tab') {
      const id = generateId();
      tabs.push({ id, url, title, favicon: '<i class="fas fa-globe"></i>' });
      return id;
    }

    function switchTab(id) {
      activeTabId = id;
      const tab = tabs.find(t => t.id === id);
      if (tab) {
        if (tab.url && tab.url !== 'about:newtab') {
          if (tab.url.startsWith('search:')) {
            performSearch(tab.url.replace('search:', ''));
          } else {
            iframe.src = tab.url;
            urlInput.value = tab.url;
            updateUIForUrl(tab.url);
          }
        } else {
          loadNewTabPage();
        }
        renderTabs();
      }
    }

    function closeTab(id) {
      const index = tabs.findIndex(t => t.id === id);
      if (index === -1) return;
      
      tabs.splice(index, 1);
      if (tabs.length === 0) {
        const newId = createTab();
        activeTabId = newId;
        loadNewTabPage();
      } else if (activeTabId === id) {
        activeTabId = tabs[Math.min(index, tabs.length - 1)].id;
        switchTab(activeTabId);
      }
      renderTabs();
    }

    function updateActiveTab(url, title) {
      const tab = tabs.find(t => t.id === activeTabId);
      if (tab) {
        tab.url = url;
        tab.title = title || url;
        renderTabs();
      }
    }

    // ----- NEW TAB PAGE -----
    function loadNewTabPage() {
      const newTabHtml = `
        <html style="background:#0E0E12; height:100%; font-family:system-ui;">
          <head>
            <meta charset="UTF-8">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
          </head>
          <body style="margin:0; background:linear-gradient(135deg, #0E0E12, #1A1A28); color:#E8E8EE; display:flex; align-items:center; justify-content:center; height:100vh;">
            <div style="text-align:center;">
              <img src="https://a3os.pages.dev/Applications/Browser/A3BrowserLogo.png" alt="A3 Logo" style="width:600px; height:auto; border-radius:12px; margin-bottom:40px;">
              <div style="margin-bottom:30px;">
                <input type="text" id="searchInput" placeholder="Search with DuckDuckGo or enter URL" style="width:500px;padding:16px 20px;background:#14141C;border:2px solid #282838;border-radius:12px;color:#FFF;font-size:16px;outline:none;" onkeypress="if(event.key==='Enter')search()">
                <button onclick="search()" style="padding:16px 30px;margin-left:10px;background:#3B82F6;border:none;border-radius:12px;color:#FFF;font-weight:600;cursor:pointer;font-size:16px;"><i class="fas fa-search"></i> Search</button>
              </div>
              <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; max-width:600px; margin:0 auto;">
                <div style="background:#1E1E2E; padding:20px; border-radius:16px; cursor:pointer; transition:all 0.2s;" onclick="navigate('https://github.com')" onmouseover="this.style.background='#252538'" onmouseout="this.style.background='#1E1E2E'">
                  <div style="font-size:24px; margin-bottom:8px; color:#9090A0;"><i class="fab fa-github"></i></div>
                  <div style="font-weight:500;">GitHub</div>
                </div>
                <div style="background:#1E1E2E; padding:20px; border-radius:16px; cursor:pointer; transition:all 0.2s;" onclick="navigate('https://wikipedia.org')" onmouseover="this.style.background='#252538'" onmouseout="this.style.background='#1E1E2E'">
                  <div style="font-size:24px; margin-bottom:8px; color:#9090A0;"><i class="fab fa-wikipedia-w"></i></div>
                  <div style="font-weight:500;">Wikipedia</div>
                </div>
                <div style="background:#1E1E2E; padding:20px; border-radius:16px; cursor:pointer; transition:all 0.2s;" onclick="navigate('https://youtube.com')" onmouseover="this.style.background='#252538'" onmouseout="this.style.background='#1E1E2E'">
                  <div style="font-size:24px; margin-bottom:8px; color:#9090A0;"><i class="fab fa-youtube"></i></div>
                  <div style="font-weight:500;">YouTube</div>
                </div>
                <div style="background:#1E1E2E; padding:20px; border-radius:16px; cursor:pointer; transition:all 0.2s;" onclick="navigate('https://reddit.com')" onmouseover="this.style.background='#252538'" onmouseout="this.style.background='#1E1E2E'">
                  <div style="font-size:24px; margin-bottom:8px; color:#9090A0;"><i class="fab fa-reddit"></i></div>
                  <div style="font-weight:500;">Reddit</div>
                </div>
              </div>
              <p style="color:#606070; margin-top:32px; font-size:0.85rem;">A3 Browser Pro · Fast · Private · Professional</p>
            </div>
            <script>
              function search() {
                const query = document.getElementById('searchInput').value.trim();
                if (query) window.parent.navigateTo(query);
              }
              function navigate(url) {
                window.parent.navigateTo(url);
              }
            <\/script>
          </body>
        </html>
      `;
      iframe.srcdoc = newTabHtml;
      urlInput.value = '';
      updateActiveTab('about:newtab', 'New Tab');
      updateUIForUrl('about:newtab');
    }

    // ----- BOOKMARKS -----
    function renderBookmarks() {
      bookmarksList.innerHTML = '';
      bookmarks.forEach((bm, index) => {
        const item = document.createElement('div');
        item.className = 'bookmark-item';
        item.innerHTML = `
          <div class="bookmark-icon"><i class="fas fa-bookmark"></i></div>
          <span class="bookmark-name">${bm.name}</span>
        `;
        item.addEventListener('click', () => navigateTo(bm.url));
        bookmarksList.appendChild(item);
      });
    }

    function addBookmark(name, url) {
      bookmarks.push({ name, url });
      renderBookmarks();
      localStorage.setItem('a3Bookmarks', JSON.stringify(bookmarks));
    }

    // ----- NAVIGATION -----
    window.navigateTo = function(input) {
      if (!input) return;
      
      if (isUrl(input)) {
        const url = processUrl(input);
        startLoading();
        
        // Add to history
        if (historyIndex < navigationHistory.length - 1) {
          navigationHistory = navigationHistory.slice(0, historyIndex + 1);
        }
        navigationHistory.push(url);
        historyIndex = navigationHistory.length - 1;
        
        iframe.src = url;
        urlInput.value = url;
        updateActiveTab(url, url);
        updateUIForUrl(url);
      } else {
        performSearch(input);
        // Add search to history
        if (historyIndex < navigationHistory.length - 1) {
          navigationHistory = navigationHistory.slice(0, historyIndex + 1);
        }
        navigationHistory.push('search:' + input);
        historyIndex = navigationHistory.length - 1;
      }
    };

    // ----- EVENT LISTENERS -----
    goBtn.addEventListener('click', () => {
      const val = urlInput.value.trim();
      if (val) window.navigateTo(val);
    });

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = urlInput.value.trim();
        if (val) window.navigateTo(val);
      }
    });

    backBtn.addEventListener('click', () => {
      if (historyIndex > 0) {
        historyIndex--;
        const prev = navigationHistory[historyIndex];
        if (prev.startsWith('search:')) {
          performSearch(prev.replace('search:', ''));
        } else {
          window.navigateTo(prev);
        }
      }
    });

    forwardBtn.addEventListener('click', () => {
      if (historyIndex < navigationHistory.length - 1) {
        historyIndex++;
        const next = navigationHistory[historyIndex];
        if (next.startsWith('search:')) {
          performSearch(next.replace('search:', ''));
        } else {
          window.navigateTo(next);
        }
      }
    });

    refreshBtn.addEventListener('click', () => {
      const tab = tabs.find(t => t.id === activeTabId);
      if (tab) {
        if (tab.url.startsWith('search:')) {
          performSearch(tab.url.replace('search:', ''));
        } else if (tab.url !== 'about:newtab') {
          window.navigateTo(tab.url);
        } else {
          loadNewTabPage();
        }
      }
    });

    homeBtn.addEventListener('click', loadNewTabPage);

    newTabBtn.addEventListener('click', () => {
      const newId = createTab();
      activeTabId = newId;
      loadNewTabPage();
      renderTabs();
    });

    iframe.addEventListener('load', () => {
      stopLoading();
      let loadedUrl = '';
      try {
        loadedUrl = iframe.contentWindow.location.href;
      } catch(e) {
        loadedUrl = urlInput.value;
      }
      
      if (loadedUrl && !loadedUrl.startsWith('about:') && !loadedUrl.startsWith('data:')) {
        urlInput.value = loadedUrl;
        updateActiveTab(loadedUrl, loadedUrl);
        updateUIForUrl(loadedUrl);
      }
    });

    iframe.addEventListener('error', stopLoading);

    // Bookmark dialog
    bookmarkPageBtn.addEventListener('click', () => {
      const currentUrl = urlInput.value;
      if (currentUrl && !currentUrl.startsWith('about:') && !currentUrl.startsWith('data:') && !currentUrl.startsWith('search:')) {
        bookmarkUrl.value = currentUrl;
        bookmarkName.value = urlDisplay.textContent || 'Bookmark';
        overlay.classList.add('active');
        bookmarkDialog.classList.add('active');
      } else if (currentUrl && currentUrl.startsWith('search:')) {
        bookmarkUrl.value = currentUrl;
        bookmarkName.value = 'Search: ' + currentUrl.replace('search:', '');
        overlay.classList.add('active');
        bookmarkDialog.classList.add('active');
      }
    });

    addBookmarkBtn.addEventListener('click', () => {
      bookmarkUrl.value = '';
      bookmarkName.value = '';
      overlay.classList.add('active');
      bookmarkDialog.classList.add('active');
    });

    cancelBookmark.addEventListener('click', () => {
      overlay.classList.remove('active');
      bookmarkDialog.classList.remove('active');
    });

    saveBookmark.addEventListener('click', () => {
      const name = bookmarkName.value.trim();
      const url = bookmarkUrl.value.trim();
      if (name && url) {
        addBookmark(name, url);
      }
      overlay.classList.remove('active');
      bookmarkDialog.classList.remove('active');
    });

    overlay.addEventListener('click', () => {
      overlay.classList.remove('active');
      bookmarkDialog.classList.remove('active');
    });

    // Load saved bookmarks
    try {
      const saved = localStorage.getItem('a3Bookmarks');
      if (saved) bookmarks = JSON.parse(saved);
    } catch(e) {}

    // Initialize
    const initialTabId = createTab();
    activeTabId = initialTabId;
    loadNewTabPage();
    renderTabs();
    
    // Add default bookmarks if none exist
    if (bookmarks.length === 0) {
      addBookmark('DuckDuckGo', 'https://duckduckgo.com');
      addBookmark('GitHub', 'https://github.com');
      addBookmark('Wikipedia', 'https://wikipedia.org');
    }
    renderBookmarks();
  })();
</script>
</body>
</html>
