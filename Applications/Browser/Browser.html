<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>A3 Browser Pro · Full Page</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- RESET & GLOBAL (dark professional, full page) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      background: #0b0b0f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: #e3e3e9;
    }

    /* main app container – exactly full screen */
    .browser-pro {
      width: 100vw;
      height: 100vh;
      max-width: none;
      max-height: none;
      background: #101014;
      border-radius: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    /* ----- TITLE BAR (window controls, branding) unchanged ----- */
    .title-bar {
  padding: 4px 18px;               /* reduced from 10px 18px */
  background: #121218;
  border-bottom: 1px solid #22222e;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  -webkit-app-region: drag;
    }
    
    .window-controls {
      display: flex;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    .window-btn {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: 0.15s ease;
    }
    .window-btn.close { background: #ff5f56; }
    .window-btn.minimize { background: #ffbd2e; }
    .window-btn.maximize { background: #28c940; }
    .window-btn:hover { filter: brightness(0.85); }

    .title-info {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #9a9aae;
      font-size: 0.9rem;
      font-weight: 500;
    }
   
    .title-logo {
  width: 28px;                     /* slightly smaller */
  height: 28px;
  border-radius: 7px;
  object-fit: contain;
  background: transparent;
  padding: 0;
    }


    .profile-badge {
      display: flex;
      align-items: center;
      gap: 14px;
      -webkit-app-region: no-drag;
    }

    .profile-icon {
  width: 32px;                     /* slightly smaller */
  height: 32px;
  background: linear-gradient(145deg, #3b82f6, #1d4ed8);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 14px;                 /* adjust font size */
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  transition: transform 0.1s;
    }
    .profile-icon:hover { transform: scale(1.02); }

    /* ----- TAB BAR (tabs + new tab) unchanged ----- */
    .tab-bar {
      display: flex;
      align-items: center;
      padding: 0 12px 0 10px;
      background: #121218;
      border-bottom: 1px solid #22222e;
      gap: 6px;
      flex-shrink: 0;
    }

    .tabs-container {
      display: flex;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      gap: 4px;
    }
    .tabs-container::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #191922;
      border-radius: 12px 12px 0 0;
      border: 1px solid #2a2a38;
      border-bottom: none;
      color: #b0b0c5;
      font-size: 0.85rem;
      max-width: 200px;
      min-width: 130px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
    }
    .tab.active {
      background: #21212e;
      color: white;
      border-color: #3b82f6;
      box-shadow: 0 -2px 0 #3b82f6;
    }
    .tab:hover:not(.active) { background: #232230; color: #ddddf0; }
    
    .tab-favicon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: #7c7c9a; }
    .tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tab-close {
      opacity: 0;
      background: none;
      border: none;
      color: #8a8aa0;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      transition: 0.15s;
      line-height: 1;
    }
    .tab:hover .tab-close { opacity: 1; }
    .tab-close:hover { color: #ef4444; }

    .new-tab-btn {
      background: #1e1e2a;
      border: 1px solid #323244;
      color: #b0b0c5;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 300;
      cursor: pointer;
      margin-left: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .new-tab-btn:hover { background: #2a2a3e; color: white; border-color: #3b82f6; }

    /* ----- MAIN LAYOUT (sidebar + content) ----- */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ----- SIDEBAR (bookmarks & tools) with collapsible support ----- */
    .sidebar {
      width: 240px;
      background: #0e0e14;
      border-right: 1px solid #20202c;
      display: flex;
      flex-direction: column;
      padding: 16px 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      flex-shrink: 0;
      transition: width 0.2s ease;
    }
    .sidebar.collapsed {
      width: 60px;
    }
    .sidebar::-webkit-scrollbar { display: none; }

    .sidebar-section { padding: 4px 8px; }
    .sidebar.collapsed .sidebar-section { padding: 4px 4px; }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 6px 16px;
      color: #6b6b82;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 700;
      white-space: nowrap;
    }
    .sidebar.collapsed .sidebar-header {
      justify-content: center;
      padding: 10px 0;
    }
    .sidebar.collapsed .sidebar-header span {
      display: none;
    }
    .sidebar.collapsed .sidebar-header button {
      margin: 0 auto;
    }

    .bookmark-item, .tool-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      margin: 2px 6px;
      border-radius: 10px;
      color: #b8b8cc;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.15s;
      white-space: nowrap;
    }
    .sidebar.collapsed .bookmark-item,
    .sidebar.collapsed .tool-item {
      justify-content: center;
      padding: 10px 0;
      margin: 2px 4px;
    }
    .sidebar.collapsed .bookmark-name,
    .sidebar.collapsed .tool-item span:not(.tool-icon):not(.bookmark-icon) {
      display: none;
    }
    .bookmark-item:hover, .tool-item:hover { background: #1e1e2c; color: white; }
    .tool-item.active {
      background: #232338;
      color: #60a5fa;
      border-left: 3px solid #3b82f6;
    }
    .sidebar.collapsed .tool-item.active {
      border-left: none;
      border-bottom: 3px solid #3b82f6;
    }
    .bookmark-icon, .tool-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8b8ba5;
      font-size: 16px;
      flex-shrink: 0;
    }
    .tool-item.active .tool-icon { color: #60a5fa; }
    .bookmark-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }

    /* Sidebar toggle button */
    .sidebar-toggle {
      margin-top: auto;
      padding: 12px;
      display: flex;
      justify-content: center;
      border-top: 1px solid #20202c;
    }
    .toggle-btn {
      background: #1e1e2a;
      border: 1px solid #323244;
      color: #b0b0c5;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn:hover { background: #2a2a3e; color: white; border-color: #3b82f6; }
    .sidebar.collapsed .toggle-btn i { transform: rotate(180deg); }

    /* ----- CONTENT AREA (nav + viewport + status) unchanged ----- */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      background: #0c0c12;
    }

    /* navigation bar */
    .nav-bar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #121218;
      gap: 14px;
      border-bottom: 1px solid #1f1f2b;
      flex-shrink: 0;
    }

    .nav-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .nav-btn {
      background: #191923;
      border: 1px solid #2f2f40;
      color: #c5c5da;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: 0.15s;
    }
    .nav-btn:hover { background: #242436; color: white; border-color: #3b82f6; }

    .url-bar-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: #16161f;
      border-radius: 16px;
      padding: 2px 2px 2px 16px;
      border: 1.5px solid #2f2f42;
      transition: 0.2s;
      min-width: 0;
    }
    .url-bar-wrapper:focus-within {
      border-color: #3b82f6;
      background: #1b1b28;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: #212130;
      border-radius: 20px;
      margin-right: 10px;
      font-size: 0.75rem;
      color: #10b981;
      flex-shrink: 0;
    }

    #urlInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #f0f0fa;
      font-size: 0.95rem;
      padding: 13px 0;
      font-family: inherit;
      min-width: 0;
    }
    #urlInput::placeholder { color: #60607a; }

    .url-actions { display: flex; gap: 4px; margin-left: 6px; flex-shrink: 0; }
    .action-btn {
      background: #1f1f2e;
      border: 1px solid #36364e;
      color: #cfcfdf;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:hover { background: #2d2d42; color: white; border-color: #3b82f6; }

    /* viewport / iframe */
    .viewport-container {
      flex: 1;
      background: #050508;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    #browserFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #101016;
      display: block;
    }

    /* status bar */
    .status-bar-pro {
      padding: 8px 20px;
      background: #121218;
      border-top: 1px solid #1f1f2b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #7a7a92;
      flex-shrink: 0;
    }

    .status-left { display: flex; align-items: center; gap: 20px; }
    .status-item { display: flex; align-items: center; gap: 8px; }

    .progress-bar {
      width: 120px;
      height: 4px;
      background: #2b2b3c;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8ab4f8);
      transition: width 0.25s;
    }

    /* dialogs (overlay & bookmark) unchanged */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(6,6,12,0.8);
      backdrop-filter: blur(6px);
      display: none;
      z-index: 999;
    }
    .overlay.active { display: block; }

    .bookmark-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e1e30;
      border: 1px solid #3f3f60;
      border-radius: 24px;
      padding: 28px;
      width: 420px;
      box-shadow: 0 30px 50px -10px black;
      display: none;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
    .bookmark-dialog.active { display: block; }
    .dialog-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 24px; color: white; }
    .dialog-input {
      width: 100%;
      padding: 14px 16px;
      background: #10101c;
      border: 1px solid #3a3a58;
      border-radius: 16px;
      color: white;
      margin-bottom: 16px;
      font-size: 0.95rem;
      outline: none;
    }
    .dialog-input:focus { border-color: #3b82f6; }
    .dialog-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .dialog-btn {
      padding: 12px 22px;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: 0.15s;
    }
    .dialog-btn.primary { background: #3b82f6; color: white; }
    .dialog-btn.primary:hover { background: #2563eb; }
    .dialog-btn.secondary { background: #2e2e48; color: #ddddee; }
    .dialog-btn.secondary:hover { background: #3f3f62; }
  </style>
</head>
<body>
<div class="browser-pro">
  <!-- TITLE BAR (original window controls kept) -->
  <div class="title-bar">
    <div class="window-controls">
      <button class="window-btn close" id="winClose"></button>
      <button class="window-btn minimize" id="winMinimize"></button>
      <button class="window-btn maximize" id="winMaximize"></button>
    </div>
    <div class="title-info">
      <img src="https://a3os.pages.dev/Applications/Browser/A3BrowserLogo.png" alt="A3 Logo" class="title-logo">
      <span>A3 Browser Pro</span>
    </div>
    <div class="profile-badge">
      <span style="color:#808096;">Workspace</span>
      <div class="profile-icon" id="profileToggle">A</div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <div class="tabs-container" id="tabsContainer"></div>
    <button class="new-tab-btn" id="newTabBtn">+</button>
  </div>

  <!-- MAIN LAYOUT (sidebar + content) -->
  <div class="main-layout">
    <!-- SIDEBAR with collapsible functionality -->
    <div class="sidebar collapsed" id="sidebar">
      <div class="sidebar-header">
        <span>Bookmarks</span>
        <button id="addBookmarkBtn" style="background:none;border:none;color:#8a8aa5;cursor:pointer;font-size:16px;"><i class="fas fa-plus"></i></button>
      </div>
      <div class="sidebar-section" id="bookmarksList">
        <!-- dynamic bookmarks will appear here -->
      </div>
      
      <div class="sidebar-header" style="margin-top:20px;">
        <span>Tools</span>
      </div>
      <div class="tool-item active" data-tool="browser">
        <span class="tool-icon"><img src="https://a3os.pages.dev/Applications/Browser/A3.png" style="width:20px;height:20px;border-radius:4px;" alt="Browser"></span>
        <span>Browser</span>
      </div>
      <div class="tool-item" data-tool="history">
        <span class="tool-icon"><i class="far fa-clock"></i></span>
        <span>History</span>
      </div>
      <div class="tool-item" data-tool="downloads">
        <span class="tool-icon"><i class="fas fa-download"></i></span>
        <span>Downloads</span>
      </div>
      <div class="tool-item" data-tool="settings">
        <span class="tool-icon"><i class="fas fa-cog"></i></span>
        <span>Settings</span>
      </div>

      <!-- Sidebar toggle button -->
      <div class="sidebar-toggle">
        <button class="toggle-btn" id="toggleSidebarBtn" title="Toggle sidebar">
          <i class="fas fa-chevron-left"></i>
        </button>
      </div>
    </div>

    <!-- CONTENT AREA -->
    <div class="content-area">
      <!-- NAVIGATION BAR -->
      <div class="nav-bar">
        <div class="nav-actions">
          <button class="nav-btn" id="backBtn" title="Back"><i class="fas fa-arrow-left"></i></button>
          <button class="nav-btn" id="forwardBtn" title="Forward"><i class="fas fa-arrow-right"></i></button>
          <button class="nav-btn" id="refreshBtn" title="Refresh"><i class="fas fa-redo-alt"></i></button>
          <button class="nav-btn" id="homeBtn" title="Home"><i class="fas fa-home"></i></button>
        </div>
        
        <div class="url-bar-wrapper">
          <div class="security-badge" id="securityBadge">
            <i class="fas fa-lock"></i>
            <span id="securityText">Secure</span>
          </div>
          <input type="text" id="urlInput" placeholder="Enter URL or search" spellcheck="false" autocomplete="off" />
          <div class="url-actions">
            <button class="action-btn" id="bookmarkPageBtn" title="Bookmark this page"><i class="far fa-bookmark"></i></button>
            <button class="action-btn" id="goBtn" title="Go"><i class="fas fa-arrow-right"></i></button>
          </div>
        </div>
      </div>

      <!-- VIEWPORT -->
      <div class="viewport-container">
        <iframe id="browserFrame" sandbox="allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-downloads" allow="fullscreen"></iframe>
      </div>

      <!-- STATUS BAR -->
      <div class="status-bar-pro">
        <div class="status-left">
          <span class="status-item" id="connectionStatus">
            <i class="fas fa-circle" style="color: #10b981; font-size: 8px;"></i>
            <span>Connected</span>
          </span>
          <span class="status-item" id="pageStatus">Ready</span>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
        <div>
          <span id="urlDisplay">a3://welcome</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- DIALOG OVERLAY & BOOKMARK DIALOG -->
<div class="overlay" id="overlay"></div>
<div class="bookmark-dialog" id="bookmarkDialog">
  <div class="dialog-title"><i class="fas fa-bookmark" style="margin-right: 12px;"></i>Add Bookmark</div>
  <input type="text" class="dialog-input" id="bookmarkName" placeholder="Name" value="">
  <input type="text" class="dialog-input" id="bookmarkUrl" placeholder="URL" value="">
  <div class="dialog-actions">
    <button class="dialog-btn secondary" id="cancelBookmark">Cancel</button>
    <button class="dialog-btn primary" id="saveBookmark">Save Bookmark</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- UI STATE ----------
    const iframe = document.getElementById('browserFrame');
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const backBtn = document.getElementById('backBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const homeBtn = document.getElementById('homeBtn');
    const newTabBtn = document.getElementById('newTabBtn');
    const tabsContainer = document.getElementById('tabsContainer');
    const bookmarksList = document.getElementById('bookmarksList');
    const addBookmarkBtn = document.getElementById('addBookmarkBtn');
    const bookmarkPageBtn = document.getElementById('bookmarkPageBtn');
    const securityBadge = document.getElementById('securityBadge');
    const connectionStatus = document.getElementById('connectionStatus');
    const pageStatus = document.getElementById('pageStatus');
    const urlDisplay = document.getElementById('urlDisplay');
    const progressFill = document.getElementById('progressFill');
    const overlay = document.getElementById('overlay');
    const bookmarkDialog = document.getElementById('bookmarkDialog');
    const bookmarkName = document.getElementById('bookmarkName');
    const bookmarkUrl = document.getElementById('bookmarkUrl');
    const cancelBookmark = document.getElementById('cancelBookmark');
    const saveBookmark = document.getElementById('saveBookmark');
    const sidebar = document.getElementById('sidebar');
    const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');

    // Mock data
    let tabs = [];
    let activeTabId = null;
    let bookmarks = [];

    // Helper: generate simple id
    function genId() { return Date.now() + '-' + Math.random().toString(36); }

    // Sidebar toggle
    toggleSidebarBtn.addEventListener('click', function() {
      sidebar.classList.toggle('collapsed');
    });

    // Homepage HTML template - smaller quick access buttons
    function getHomepageHTML() {
      return `
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body {
              height: 100vh;
              width: 100vw;
              overflow: hidden;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              background: linear-gradient(135deg, #0a0a0f 0%, #13131c 50%, #0e0e16 100%);
              color: #e3e3e9;
            }
            .homepage-container {
              width: 100%;
              height: 100vh;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              padding: 20px;
              overflow: hidden;
            }
            .homepage-logo {
              text-align: center;
              margin-bottom: 30px;
              flex-shrink: 0;
            }
            .homepage-logo img {
              width: auto;
              max-width: min(700px, 95%);
              height: auto;
              max-height: 280px;
              object-fit: contain;
              filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.5));
              transition: transform 0.3s ease;
            }
            .homepage-logo img:hover {
              transform: scale(1.02);
            }
            .search-container {
              width: 100%;
              max-width: 650px;
              margin-bottom: 40px;
              flex-shrink: 0;
            }
            .search-box {
              display: flex;
              gap: 12px;
              background: #16161f;
              padding: 6px;
              border-radius: 18px;
              border: 1.5px solid #2f2f42;
              transition: all 0.3s;
            }
            .search-box:focus-within {
              border-color: #3b82f6;
              box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
              background: #1b1b28;
            }
            .search-box input {
              flex: 1;
              background: transparent;
              border: none;
              padding: 14px 18px;
              color: #f0f0fa;
              font-size: 1rem;
              outline: none;
            }
            .search-box input::placeholder {
              color: #60607a;
            }
            .search-box button {
              background: #3b82f6;
              border: none;
              padding: 12px 28px;
              border-radius: 14px;
              color: white;
              font-weight: 600;
              font-size: 0.95rem;
              cursor: pointer;
              transition: all 0.15s;
              display: flex;
              align-items: center;
              gap: 8px;
              white-space: nowrap;
            }
            .search-box button:hover {
              background: #2563eb;
              transform: translateY(-1px);
              box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
            }
            .quick-links {
              width: 100%;
              max-width: 800px;
              flex-shrink: 0;
            }
            .quick-links h3 {
              color: #9a9aae;
              font-size: 0.85rem;
              text-transform: uppercase;
              letter-spacing: 1px;
              margin-bottom: 18px;
              text-align: center;
            }
            .quick-links-grid {
              display: grid;
              grid-template-columns: repeat(6, 1fr);
              gap: 10px;
            }
            .quick-link-item {
              background: #161622;
              border: 1px solid #2a2a3a;
              border-radius: 12px;
              padding: 10px 6px;
              text-align: center;
              cursor: pointer;
              transition: all 0.2s;
              text-decoration: none;
              color: #c5c5da;
            }
            .quick-link-item:hover {
              background: #1e1e30;
              border-color: #3b82f6;
              transform: translateY(-2px);
              box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
              color: white;
            }
            .quick-link-icon {
              font-size: 22px;
              margin-bottom: 8px;
              color: #3b82f6;
            }
            .quick-link-name {
              font-size: 0.75rem;
              font-weight: 500;
            }
            .footer-note {
              margin-top: 40px;
              color: #60607a;
              font-size: 0.75rem;
              text-align: center;
              flex-shrink: 0;
            }
            @media (max-width: 768px) {
              .homepage-container {
                padding: 15px;
              }
              .homepage-logo img {
                max-height: 200px;
              }
              .search-box {
                flex-direction: column;
              }
              .search-box button {
                width: 100%;
                justify-content: center;
                padding: 12px;
              }
              .quick-links-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
              }
              .footer-note {
                margin-top: 25px;
              }
            }
            @media (max-height: 600px) {
              .homepage-logo {
                margin-bottom: 15px;
              }
              .homepage-logo img {
                max-height: 160px;
              }
              .search-container {
                margin-bottom: 20px;
              }
              .quick-link-item {
                padding: 8px 4px;
              }
              .quick-link-icon {
                font-size: 20px;
                margin-bottom: 6px;
              }
              .footer-note {
                margin-top: 20px;
              }
            }
          </style>
        </head>
        <body>
          <div class="homepage-container">
            <div class="homepage-logo">
              <img src="https://a3os.pages.dev/Applications/Browser/A3BrowserLogo.png" alt="A3 Browser">
            </div>
            
            <div class="search-container">
              <div class="search-box">
                <input type="text" id="homepageSearch" placeholder="Search or enter website address" autofocus>
                <button onclick="navigateFromHomepage()">
                  <i class="fas fa-arrow-right"></i>
                  Go
                </button>
              </div>
            </div>

            <div class="quick-links">
              <h3><i class="fas fa-star" style="margin-right: 8px;"></i>Quick Access</h3>
              <div class="quick-links-grid">
                <div class="quick-link-item" onclick="navigateTo('https://www.google.com')">
                  <div class="quick-link-icon"><i class="fab fa-google"></i></div>
                  <div class="quick-link-name">Google</div>
                </div>
                <div class="quick-link-item" onclick="navigateTo('https://www.youtube.com')">
                  <div class="quick-link-icon"><i class="fab fa-youtube"></i></div>
                  <div class="quick-link-name">YouTube</div>
                </div>
                <div class="quick-link-item" onclick="navigateTo('https://github.com')">
                  <div class="quick-link-icon"><i class="fab fa-github"></i></div>
                  <div class="quick-link-name">GitHub</div>
                </div>
                <div class="quick-link-item" onclick="navigateTo('https://www.wikipedia.org')">
                  <div class="quick-link-icon"><i class="fab fa-wikipedia-w"></i></div>
                  <div class="quick-link-name">Wiki</div>
                </div>
                <div class="quick-link-item" onclick="navigateTo('https://a3os.pages.dev')">
                  <div class="quick-link-icon"><i class="fas fa-globe"></i></div>
                  <div class="quick-link-name">A3 OS</div>
                </div>
                <div class="quick-link-item" onclick="navigateTo('https://www.reddit.com')">
                  <div class="quick-link-icon"><i class="fab fa-reddit"></i></div>
                  <div class="quick-link-name">Reddit</div>
                </div>
              </div>
            </div>

            <div class="footer-note">
              <i class="fas fa-shield-alt" style="margin-right: 6px;"></i>
              A3 Browser Pro · Fast · Private · Professional
            </div>
          </div>

          <script>
            function navigateFromHomepage() {
              const input = document.getElementById('homepageSearch');
              const url = input.value.trim();
              if (url) {
                window.parent.postMessage({ type: 'navigate', url: url }, '*');
              }
            }
            
            function navigateTo(url) {
              window.parent.postMessage({ type: 'navigate', url: url }, '*');
            }

            // Handle Enter key
            document.getElementById('homepageSearch').addEventListener('keypress', function(e) {
              if (e.key === 'Enter') {
                navigateFromHomepage();
              }
            });
          <\/script>
        </body>
        </html>
      `;
    }

    // Listen for messages from iframe
    window.addEventListener('message', function(event) {
      if (event.data.type === 'navigate') {
        const url = event.data.url;
        if (url) {
          let processedUrl = url;
          if (!url.startsWith('http://') && !url.startsWith('https://')) {
            processedUrl = 'https://' + url;
          }
          urlInput.value = processedUrl;
          urlDisplay.textContent = new URL(processedUrl).hostname;
          pageStatus.textContent = 'Loading...';
          progressFill.style.width = '60%';
          setTimeout(() => {
            progressFill.style.width = '100%';
            pageStatus.textContent = 'Ready';
            setTimeout(() => progressFill.style.width = '0%', 200);
          }, 800);
          
          // Update active tab
          const activeTab = tabs.find(t => t.id === activeTabId);
          if (activeTab) {
            activeTab.url = processedUrl;
            activeTab.title = new URL(processedUrl).hostname;
            renderTabs();
          }
        }
      }
    });

    // ---------- UI RENDER (tabs & bookmarks) ----------
    function renderTabs() {
      tabsContainer.innerHTML = '';
      tabs.forEach(tab => {
        const tabEl = document.createElement('div');
        tabEl.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
        const title = tab.title || 'New Tab';
        const shortTitle = title.length > 22 ? title.slice(0,19)+'…' : title;
        tabEl.innerHTML = `
          <div class="tab-favicon"><i class="fas fa-globe"></i></div>
          <span class="tab-title">${shortTitle}</span>
          <button class="tab-close" data-id="${tab.id}">×</button>
        `;
        tabEl.addEventListener('click', (e) => {
          if (!e.target.classList.contains('tab-close')) {
            setActiveTab(tab.id);
          }
        });
        tabEl.querySelector('.tab-close').addEventListener('click', (e) => {
          e.stopPropagation();
          closeTab(tab.id);
        });
        tabsContainer.appendChild(tabEl);
      });
    }

    function renderBookmarks() {
      bookmarksList.innerHTML = '';
      if (bookmarks.length === 0) {
        const emptyItem = document.createElement('div');
        emptyItem.className = 'bookmark-item';
        emptyItem.style.opacity = '0.6';
        emptyItem.style.cursor = 'default';
        emptyItem.innerHTML = `<div class="bookmark-icon"><i class="far fa-bookmark"></i></div><span class="bookmark-name">No bookmarks</span>`;
        bookmarksList.appendChild(emptyItem);
        return;
      }
      bookmarks.forEach(bm => {
        const item = document.createElement('div');
        item.className = 'bookmark-item';
        item.innerHTML = `
          <div class="bookmark-icon"><i class="fas fa-bookmark"></i></div>
          <span class="bookmark-name">${bm.name}</span>
        `;
        item.addEventListener('click', () => {
          urlInput.value = bm.url;
          urlDisplay.textContent = bm.name;
          pageStatus.textContent = 'Loading...';
          progressFill.style.width = '60%';
          setTimeout(() => {
            progressFill.style.width = '100%';
            pageStatus.textContent = 'Ready';
            setTimeout(() => progressFill.style.width = '0%', 200);
          }, 600);
        });
        bookmarksList.appendChild(item);
      });
    }

    function setActiveTab(id) {
      activeTabId = id;
      const tab = tabs.find(t => t.id === id);
      if (tab) {
        if (tab.url && !tab.url.startsWith('about:')) {
          urlInput.value = tab.url;
          urlDisplay.textContent = tab.title || tab.url;
        } else {
          urlInput.value = '';
          urlDisplay.textContent = 'a3://newtab';
        }
        // Show homepage for new tabs
        if (!tab.url || tab.url === 'about:newtab') {
          iframe.srcdoc = getHomepageHTML();
        }
      }
      renderTabs();
    }

    function closeTab(id) {
      const index = tabs.findIndex(t => t.id === id);
      if (index === -1) return;
      tabs.splice(index, 1);
      if (tabs.length === 0) {
        const newId = genId();
        tabs.push({ id: newId, title: 'New Tab', url: 'about:newtab' });
        activeTabId = newId;
        iframe.srcdoc = getHomepageHTML();
        urlInput.value = '';
        urlDisplay.textContent = 'a3://welcome';
      } else if (activeTabId === id) {
        activeTabId = tabs[Math.min(index, tabs.length-1)].id;
        setActiveTab(activeTabId);
      }
      renderTabs();
    }

    function addTab() {
      const newId = genId();
      tabs.push({ id: newId, title: 'New Tab', url: 'about:newtab' });
      activeTabId = newId;
      setActiveTab(newId);
      renderTabs();
    }

    // ---------- EVENT LISTENERS ----------
    goBtn.addEventListener('click', () => {
      const val = urlInput.value.trim();
      if (val) {
        let processedUrl = val;
        if (!val.startsWith('http://') && !val.startsWith('https://')) {
          processedUrl = 'https://' + val;
        }
        urlDisplay.textContent = new URL(processedUrl).hostname;
        pageStatus.textContent = 'Navigating...';
        progressFill.style.width = '70%';
        setTimeout(() => { 
          progressFill.style.width = '100%'; 
          pageStatus.textContent = 'Ready'; 
        }, 600);
        setTimeout(() => progressFill.style.width = '0%', 800);
        
        const activeTab = tabs.find(t => t.id === activeTabId);
        if (activeTab) {
          activeTab.url = processedUrl;
          activeTab.title = new URL(processedUrl).hostname;
          renderTabs();
        }
      }
    });
    
    urlInput.addEventListener('keydown', (e) => { 
      if (e.key === 'Enter') goBtn.click(); 
    });

    backBtn.addEventListener('click', () => pageStatus.textContent = 'Back (UI)');
    forwardBtn.addEventListener('click', () => pageStatus.textContent = 'Forward (UI)');
    refreshBtn.addEventListener('click', () => {
      pageStatus.textContent = 'Refreshing...';
      progressFill.style.width = '50%';
      setTimeout(() => { 
        progressFill.style.width = '100%'; 
        pageStatus.textContent = 'Ready'; 
      }, 400);
      setTimeout(() => progressFill.style.width = '0%', 600);
    });
    
    homeBtn.addEventListener('click', () => {
      const activeTab = tabs.find(t => t.id === activeTabId);
      if (activeTab) {
        activeTab.url = 'about:newtab';
        activeTab.title = 'New Tab';
        renderTabs();
      }
      urlInput.value = '';
      urlDisplay.textContent = 'a3://home';
      iframe.srcdoc = getHomepageHTML();
    });

    newTabBtn.addEventListener('click', addTab);

    // Bookmark dialog
    function openBookmarkDialog(prefillUrl = '', prefillName = '') {
      bookmarkUrl.value = prefillUrl;
      bookmarkName.value = prefillName;
      overlay.classList.add('active');
      bookmarkDialog.classList.add('active');
    }
    
    bookmarkPageBtn.addEventListener('click', () => {
      const current = urlInput.value.trim();
      openBookmarkDialog(current, urlDisplay.textContent || 'Bookmark');
    });
    
    addBookmarkBtn.addEventListener('click', () => openBookmarkDialog('', ''));
    
    cancelBookmark.addEventListener('click', () => {
      overlay.classList.remove('active');
      bookmarkDialog.classList.remove('active');
    });
    
    overlay.addEventListener('click', () => {
      overlay.classList.remove('active');
      bookmarkDialog.classList.remove('active');
    });
    
    saveBookmark.addEventListener('click', () => {
      const name = bookmarkName.value.trim();
      let url = bookmarkUrl.value.trim();
      if (!name || !url) return;
      if (!url.startsWith('http')) url = 'https://' + url;
      bookmarks.push({ name, url });
      renderBookmarks();
      overlay.classList.remove('active');
      bookmarkDialog.classList.remove('active');
    });

    // Window controls (simulate)
    document.getElementById('winClose').addEventListener('click', () => alert('Close window (UI mock)'));
    document.getElementById('winMaximize').addEventListener('click', () => {
      if (!document.fullscreenElement) document.querySelector('.browser-pro').requestFullscreen();
      else document.exitFullscreen();
    });

    // Tool item switching
    document.querySelectorAll('.tool-item').forEach(el => {
      el.addEventListener('click', function() {
        document.querySelectorAll('.tool-item').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tool = this.dataset.tool;
        if (tool === 'browser') {
          homeBtn.click();
        } else {
          pageStatus.textContent = `${tool.charAt(0).toUpperCase() + tool.slice(1)} view`;
        }
      });
    });

    // Initialize
    (function init() {
      const initId = genId();
      tabs = [{ id: initId, title: 'New Tab', url: 'about:newtab' }];
      activeTabId = initId;
      renderTabs();
      renderBookmarks();
      iframe.srcdoc = getHomepageHTML();
      urlDisplay.textContent = 'a3://welcome';
      urlInput.value = '';
    })();

  })();
</script>
</body>
</html>
