<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Screen</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="Favicon/A3.svg" type="image/svg+xml">
  <style>
    /* Clean readable app labels */
    .desktop-apps .app {
      font-weight: normal !important;
      color: white !important;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8px;
    }
    
    /* Remove any bold styling */
    .app, .app span, .desktop-apps .app {
      font-weight: normal !important;
    }
    
    /* Style the text inside app divs */
    .desktop-apps .app {
      font-size: 11px !important;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif !important;
      color: rgba(255, 255, 255, 0.95) !important;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8) !important;
      text-transform: none !important;
      letter-spacing: 0.2px !important;
      line-height: 1.4 !important;
    }
    
    /* Position icon above text */
    .desktop-apps .app::before {
      top: 35% !important;
    }
    
    /* Make sure text is visible */
    .desktop-apps .app {
      text-align: center;
      word-wrap: break-word;
    }
  </style>
  <script>
    (function() {
      if (!sessionStorage.getItem('authenticated')) {
        document.body.innerHTML = '<div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:\'Courier New\',monospace;color:#fff;font-size:2rem;z-index:9999;">Access Denied. Return to login.</div>';
        window.location.href = 'index.html';
        return;
      }
    })();
  </script>
</head>
<body>
  <div id="bg-image"></div>
  <div id="app-container">
  <!-- Desktop Apps Sidebar -->
  <div class="desktop-apps">

    <!-- App1 -->
    <div class="app app-thispc" id="app1">This PC</div>
    <!-- App1 end -->

    <!-- App2 -->
    <div class="app app-browser" id="app2">Browser</div>
    <!-- App2 end -->

    <!-- App3 -->
    <div class="app app-discord" id="app3" draggable="true">Discord</div>
    <!-- App3 end -->

    <!-- App4 -->
    <div class="app app-folder" id="app4" draggable="true">Folder</div>
    <!-- App4 end -->

    <!-- App5 -->    
     <div class="app app-gallery" id="app5" draggable="true">Gallery</div>    
    <!-- App5 end -->

    <!-- App6 -->
    <div class="app app-notepad" id="app6" draggable="true">Notepad</div>
    <!-- App6 end -->

    <!-- App7 -->
    <div class="app app-pdf" id="app7">Poem.txt</div>
    <!-- App7 end -->

    <!-- App8 -->
    <div class="app app-terminal" id="app8">Terminal</div>
    <!-- App8 end -->

    <!-- App9 -->
    <div class="app app-instagram" id="app9">Instagram</div>
    <!-- App9 end -->

    <!-- App10 -->
    <div class="app app-music" id="app10">Music</div>
    <!-- App10 end -->

    <!-- App11 - BTC (Bitcoin) -->
    <div class="app app-bitcoin" id="app11" draggable="true">BTC</div>
    <!-- App11 end -->
  </div>
  </div><!-- app-container end -->
  </div>

  <!-- Start Menu Overlay -->
  <div id="start-menu" class="start-menu hidden">
    <div class="start-menu-container">
      <!-- User Profile Section -->
      <div class="start-user-section">
        <div class="user-avatar"></div>
        <div class="user-info">
          <div class="user-name">User</div>
          <div class="user-email">user@nymos.local</div>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="start-search">
        <input type="text" placeholder="Type here to search" class="search-input">
      </div>

      <!-- Pinned Apps Section -->
      <div class="start-section">
        <div class="section-title">Pinned</div>
        <div class="app-grid">
          <div class="start-app-item" data-app="thispc">
            <div class="start-app-icon thispc-icon"></div>
            <span>This PC</span>
          </div>
          <div class="start-app-item" data-app="browser">
            <div class="start-app-icon browser-icon"></div>
            <span>Browser</span>
          </div>
          <div class="start-app-item" data-app="discord">
            <div class="start-app-icon discord-icon"></div>
            <span>Discord</span>
          </div>
          <div class="start-app-item" data-app="folder">
            <div class="start-app-icon folder-icon"></div>
            <span>Folder</span>
          </div>
          <div class="start-app-item" data-app="gallery">
            <div class="start-app-icon gallery-icon"></div>
            <span>Gallery</span>
          </div>
          <div class="start-app-item" data-app="notepad">
            <div class="start-app-icon notepad-icon"></div>
            <span>Notepad</span>
          </div>
        </div>
      </div>

      <!-- All Apps Section -->
      <div class="start-section">
        <div class="section-title">All Apps</div>
        <div class="app-list">
          <div class="app-list-item" data-app="terminal">
            <div class="app-list-icon terminal-icon"></div>
            <span>Terminal</span>
          </div>
          <div class="app-list-item" data-app="instagram">
            <div class="app-list-icon instagram-icon"></div>
            <span>Instagram</span>
          </div>
          <div class="app-list-item" data-app="music">
            <div class="app-list-icon music-icon"></div>
            <span>Music Player</span>
          </div>
          <div class="app-list-item" data-app="bitcoin">
            <div class="app-list-icon bitcoin-icon"></div>
            <span>Bitcoin (BTC)</span>
          </div>
        </div>
      </div>

      <!-- Bottom Actions -->
      <div class="start-bottom">
        <div class="start-bottom-item">
          <div class="bottom-icon settings-icon"></div>
          <span>Settings</span>
        </div>
        <div class="start-bottom-item">
          <div class="bottom-icon power-icon"></div>
          <span>Power</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Taskbar - Bottom Bar like Windows -->
  <div class="taskbar">
    <!-- Home Button -->
    <div class="home-button" id="home-button"></div>
    
    <!-- Right side icons with images -->
    <div class="taskbar-right">
      <div class="taskbar-icon arrow"></div>
      <div class="taskbar-icon sound"></div>
      <div class="taskbar-icon wifi"></div>
      <div class="taskbar-icon nymos"></div>
      <div id="clock" class="taskbar-icon clock">00:00</div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('beforeunload', function() {
      sessionStorage.removeItem('authenticated');
    });
  </script>

</body>


</html>
